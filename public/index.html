<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chess Brawl</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --text: #fff6e7;
      --muted: #ead8bb;
      --gold: #ffd978;
      --brown: #4e2d16;
      --cream: #f2dfbd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: #3b2110;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #9b673a, #4b2914);
      box-shadow: 0 12px 24px rgba(0,0,0,.28);
    }

    button.secondary {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.15);
    }

    button.danger {
      background: linear-gradient(135deg, #7a2230, #321b13);
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      color: white;
      outline: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,221,160,.18), transparent 30%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.08), transparent 24%),
        linear-gradient(180deg, #805834, #32190c);
    }

    #menu {
      width: min(1200px, 100%);
      height: min(760px, 100%);
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
    }

    .panel {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
      background: rgba(55, 31, 14, .76);
      box-shadow: 0 28px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 26px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -100%;
      background:
        linear-gradient(45deg, rgba(242,223,189,.18) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(242,223,189,.18) 75%),
        linear-gradient(45deg, transparent 75%, rgba(70,38,18,.26) 75%),
        linear-gradient(45deg, rgba(70,38,18,.26) 25%, transparent 25%);
      background-size: 86px 86px;
      background-position: 0 0, 43px 43px, 0 0, 43px 43px;
      transform: rotate(-14deg);
      animation: boardMove 16s linear infinite;
      opacity: .9;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 40% 18%, rgba(255,255,255,.12), transparent 32%),
        linear-gradient(180deg, rgba(55,31,14,.18), rgba(35,17,7,.72));
      pointer-events: none;
    }

    @keyframes boardMove {
      to {
        background-position: 172px 172px, 215px 215px, 172px 172px, 215px 215px;
      }
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0;
      font-size: clamp(44px, 6vw, 86px);
      line-height: .9;
      letter-spacing: -.075em;
      font-weight: 1000;
    }

    .title span {
      color: var(--gold);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .setup {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .character-card {
      min-height: 188px;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.15);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
      position: relative;
      overflow: hidden;
    }

    .character-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.36);
    }

    .character-card.selected {
      border-color: rgba(255,217,120,.95);
      box-shadow: inset 0 0 0 1px rgba(255,217,120,.45), 0 0 30px rgba(255,217,120,.13);
    }

    .piece-big {
      height: 104px;
      display: grid;
      place-items: center;
      font: 900 90px Georgia, "Times New Roman", serif;
      color: #fff4df;
      text-shadow: 0 3px 0 rgba(60,36,17,.75), 0 14px 24px rgba(0,0,0,.38);
    }

    .character-card h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .character-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.28;
      color: var(--muted);
    }

    .side-panel {
      padding: 22px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
    }

    .badge {
      display: inline-block;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.09);
      color: var(--muted);
      font-size: 11px;
    }

    .lobbies {
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .lobby-card {
      display: grid;
      gap: 8px;
      padding: 13px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .lobby-top,
    .lobby-actions {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .lobby-actions button {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
    }

    .lobby-name {
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard {
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 6px;
    }

    #gameWrap {
      display: none;
      width: min(100vw, 1280px);
      height: min(100vh, 760px);
      place-items: center;
    }

    #gameFrame {
      position: relative;
      width: min(100%, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 35px 100px rgba(0,0,0,.58);
      background: #c8a57a;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #topHud {
      position: absolute;
      inset: 16px 18px auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: start;
    }

    .hudSide {
      display: grid;
      gap: 7px;
    }

    .hudSide.right {
      text-align: right;
    }

    .nameLine {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }

    .hudSide.right .nameLine {
      justify-content: flex-end;
    }

    .barShell,
    .meterShell,
    .ultimateShell {
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.36);
      box-shadow: inset 0 2px 8px rgba(0,0,0,.4);
    }

    .barShell {
      height: 18px;
    }

    .meterShell {
      height: 8px;
    }

    .ultimateShell {
      height: 11px;
      border-color: rgba(255,220,120,.38);
      background: rgba(0,0,0,.5);
      box-shadow: 0 0 12px rgba(255,217,120,.12), inset 0 2px 8px rgba(0,0,0,.45);
    }

    .bar,
    .meter {
      height: 100%;
      border-radius: 999px;
      transition: width .08s linear;
    }

    .whiteHp {
      background: linear-gradient(90deg, #fff7dc, #d8c49a, #8b6d45);
    }

    .blackHp {
      background: linear-gradient(90deg, #646464, #222, #050505);
    }

    .stamina {
      background: linear-gradient(90deg, #f4f0df, #a9936f);
    }

    .promo {
      background: linear-gradient(90deg, #ffe36d, #d8a63b);
    }

    .ultimate {
      background: linear-gradient(90deg, #fff1a8, #ffd347, #f2952e);
      box-shadow: 0 0 16px rgba(255,211,71,.65);
    }

    #centerHud {
      text-align: center;
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    #roundText {
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: rgba(255,255,255,.92);
    }

    #timer {
      min-width: 78px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 24px;
      font-weight: 1000;
    }

    #message {
      position: absolute;
      left: 50%;
      top: 24%;
      transform: translateX(-50%);
      max-width: 80%;
      min-width: 260px;
      text-align: center;
      padding: 14px 20px;
      border-radius: 20px;
      background: rgba(60,34,17,.55);
      border: 1px solid rgba(255,255,255,.16);
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 1000;
      letter-spacing: -.04em;
      text-shadow: 0 2px 18px rgba(0,0,0,.8);
      opacity: 0;
      transition: opacity .18s ease;
    }

    #message.show {
      opacity: 1;
    }

    #debugNotice {
      position: absolute;
      right: 18px;
      top: 130px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.2);
      color: #ffe9a8;
      font-size: 12px;
      opacity: 0;
      transition: opacity .15s ease;
    }

    #debugNotice.show {
      opacity: 1;
    }

    #bottomHud {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      color: rgba(255,255,255,.9);
      font-size: 12px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
      pointer-events: none;
    }

    #controls {
      max-width: 860px;
      line-height: 1.45;
    }

    #leaveBtn {
      pointer-events: auto;
      padding: 9px 12px;
      font-size: 13px;
    }

    .hud-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .sound-control {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.36);
      box-shadow: 0 10px 24px rgba(0,0,0,.24);
    }

    #soundBtn {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 1000;
      box-shadow: none;
    }

    #soundBtn.muted {
      opacity: .58;
      filter: grayscale(1);
    }

    #soundVolume {
      width: 90px;
      padding: 0;
      accent-color: #ffd978;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      #menu {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .setup {
        grid-template-columns: 1fr;
      }

      .character-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main id="menu">
      <section class="panel hero">
        <div>
          <h1 class="title">CHESS<br><span>BRAWL</span></h1>
          <p class="subtitle">
            Chess fighting game.
          </p>
        </div>

        <div class="setup">
          <label>
            <span class="badge">Name</span>
            <input id="nameInput" placeholder="Player name" maxlength="18" />
          </label>

          <label>
            <span class="badge">Board name</span>
            <input id="lobbyInput" placeholder="Lobby name" maxlength="28" />
          </label>

          <button id="createBtn">Create Board</button>
        </div>

        <div id="characterGrid" class="character-grid"></div>
      </section>

      <aside class="panel side-panel">
        <div>
          <h2 class="section-title">Open Boards</h2>
          <p class="subtitle">Join a waiting board or watch a match in progress.</p>
        </div>

        <div id="lobbies" class="lobbies"></div>

        <div>
          <h2 class="section-title">Leaderboard</h2>
          <div id="leaderboard" class="leaderboard"></div>
        </div>
      </aside>
    </main>

    <section id="gameWrap">
      <div id="gameFrame">
        <canvas id="game" width="960" height="540"></canvas>

        <div id="overlay">
          <div id="topHud">
            <div class="hudSide">
              <div class="nameLine">
                <span id="whiteName">White</span>
                <span id="whitePiece" class="badge">King</span>
              </div>
              <div class="barShell"><div id="whiteHp" class="bar whiteHp"></div></div>
              <div class="meterShell"><div id="whiteMeter" class="meter stamina"></div></div>
              <div class="meterShell"><div id="whitePromo" class="meter promo"></div></div>
              <div class="ultimateShell"><div id="whiteUlt" class="meter ultimate"></div></div>
            </div>

            <div id="centerHud">
              <div id="roundText">Round 1</div>
              <div id="timer">99</div>
            </div>

            <div class="hudSide right">
              <div class="nameLine">
                <span id="blackPiece" class="badge">King</span>
                <span id="blackName">Black</span>
              </div>
              <div class="barShell"><div id="blackHp" class="bar blackHp"></div></div>
              <div class="meterShell"><div id="blackMeter" class="meter stamina"></div></div>
              <div class="meterShell"><div id="blackPromo" class="meter promo"></div></div>
              <div class="ultimateShell"><div id="blackUlt" class="meter ultimate"></div></div>
            </div>
          </div>

          <div id="message"></div>
          <div id="debugNotice">Hitboxes ON</div>

          <div id="bottomHud">
            <div id="controls">
              <b>Move:</b> A/D · <b>Jump:</b> W/Space · <b>Crouch/Fast Fall:</b> S ·
              <b>Light:</b> J · <b>Heavy:</b> K · <b>Special:</b> L ·
              <b>Ultimate:</b> I · <b>Dash / Counter:</b> Shift · <b>Hitboxes:</b> H
            </div>
            <div class="hud-actions">
              <div class="sound-control">
                <button id="soundBtn" class="secondary" aria-label="Toggle sound" title="Toggle sound">&#9835;</button>
                <input id="soundVolume" type="range" min="0" max="100" value="72" aria-label="Sound volume" title="Sound volume" />
              </div>
              <button id="leaveBtn" class="danger">Leave</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const socket = io();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const menu = document.getElementById("menu");
    const gameWrap = document.getElementById("gameWrap");
    const characterGrid = document.getElementById("characterGrid");
    const lobbiesEl = document.getElementById("lobbies");
    const leaderboardEl = document.getElementById("leaderboard");

    const nameInput = document.getElementById("nameInput");
    const lobbyInput = document.getElementById("lobbyInput");
    const createBtn = document.getElementById("createBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const soundBtn = document.getElementById("soundBtn");
    const soundVolume = document.getElementById("soundVolume");

    const whiteNameEl = document.getElementById("whiteName");
    const blackNameEl = document.getElementById("blackName");
    const whitePieceEl = document.getElementById("whitePiece");
    const blackPieceEl = document.getElementById("blackPiece");
    const whiteHpEl = document.getElementById("whiteHp");
    const blackHpEl = document.getElementById("blackHp");
    const whiteMeterEl = document.getElementById("whiteMeter");
    const blackMeterEl = document.getElementById("blackMeter");
    const whitePromoEl = document.getElementById("whitePromo");
    const blackPromoEl = document.getElementById("blackPromo");
    const whiteUltEl = document.getElementById("whiteUlt");
    const blackUltEl = document.getElementById("blackUlt");
    const roundTextEl = document.getElementById("roundText");
    const timerEl = document.getElementById("timer");
    const messageEl = document.getElementById("message");
    const debugNoticeEl = document.getElementById("debugNotice");

    const GLYPHS = {
      king: "♔",
      queen: "♕",
      rook: "♖",
      bishop: "♗",
      knight: "♘",
      pawn: "♙"
    };

    const state = {
      id: null,
      role: "menu",
      selected: "king",
      characters: {},
      lobbyData: { lobbies: [], leaderboard: [] },
      gameState: null,
      seenFx: new Set(),
      particles: [],
      localFx: [],
      t: 0,
      shake: 0,
      flash: 0,
      showHitboxes: false,
      lastAudioRoundKey: null,
      lastAudioSecond: null,
      lastAudioStatus: null,
      input: {
        left: false,
        right: false,
        up: false,
        down: false,
        seq: {
          light: 0,
          heavy: 0,
          special: 0,
          counter: 0,
          ultimate: 0,
          jump: 0
        }
      }
    };

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function pct(v, max) {
      return max ? clamp(v / max * 100, 0, 100) : 0;
    }

    function pieceOf(f) {
      if (!f) return "king";
      if (f.characterKey === "pawn" && f.promoted) return "queen";
      return f.characterKey || "king";
    }

    function isBishopSword(f) {
      return !!(
        f &&
        f.characterKey === "bishop" &&
        f.ultimateState &&
        f.ultimateState.type === "bishopSword" &&
        f.ultimateState.phase === "active"
      );
    }

    function glyph(f) {
      return GLYPHS[pieceOf(f)] || "♙";
    }

    function mat(f) {
      if (!f || f.side === "black") {
        return {
          fill: "#080808",
          fill2: "#2a2a2a",
          outline: "rgba(255,255,255,.36)",
          glow: "rgba(50,50,50,.88)",
          weapon: "#111",
          weapon2: "#555",
          edge: "#f5ead7",
          magic: "rgba(95,95,95,.9)",
          ult: "rgba(255,214,80,.85)",
          sword: "#111111",
          sword2: "#454545",
          dust: "80,70,60"
        };
      }

      return {
        fill: "#fff4dc",
        fill2: "#e5cfa8",
        outline: "rgba(61,38,19,.75)",
        glow: "rgba(255,235,185,.9)",
        weapon: "#f2dfbd",
        weapon2: "#b38348",
        edge: "#503018",
        magic: "rgba(255,232,170,.9)",
        ult: "rgba(255,211,71,.95)",
        sword: "#1a1a1a",
        sword2: "#555555",
        dust: "210,185,145"
      };
    }

    function dir(f) {
      return f.attack ? (f.attackFacing || f.facing || 1) : (f.facing || 1);
    }

    function center(f) {
      return { x: f.x + f.w / 2, y: f.y + f.h / 2 };
    }

    function progress(f) {
      if (!f.attackDuration) return 0;
      return clamp((f.attackDuration - f.attackTimer) / f.attackDuration, 0, 1);
    }

    function elapsed(f) {
      return f.attackDuration - f.attackTimer;
    }

    function ease(x) {
      x = Number.isFinite(x) ? x : 0;
      return 1 - Math.pow(1 - clamp(x, 0, 1), 3);
    }

    function html(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[c]));
    }

    const audio = {
      ctx: null,
      master: null,
      sfxGain: null,
      musicGain: null,
      limiter: null,
      noiseBuffer: null,
      muted: localStorage.getItem("chessBrawlMuted") === "1",
      volume: clamp(Number(localStorage.getItem("chessBrawlVolume") || 0.72), 0, 1),
      recent: new Map(),
      previewAt: 0,
      musicMode: null,
      nextMusicAt: 0,
      musicStep: 0,
      musicTimer: null,
      duckUntil: 0
    };

    function initAudio() {
      if (audio.ctx) return true;

      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) return false;

      audio.ctx = new AudioCtor();
      audio.master = audio.ctx.createGain();
      audio.sfxGain = audio.ctx.createGain();
      audio.musicGain = audio.ctx.createGain();
      audio.limiter = audio.ctx.createDynamicsCompressor();

      audio.limiter.threshold.value = -16;
      audio.limiter.knee.value = 18;
      audio.limiter.ratio.value = 8;
      audio.limiter.attack.value = 0.003;
      audio.limiter.release.value = 0.18;

      audio.sfxGain.gain.value = 0.92;
      audio.musicGain.gain.value = 0.24;
      audio.sfxGain.connect(audio.master);
      audio.musicGain.connect(audio.master);
      audio.master.connect(audio.limiter);
      audio.limiter.connect(audio.ctx.destination);

      const len = Math.max(1, Math.floor(audio.ctx.sampleRate * 1.4));
      audio.noiseBuffer = audio.ctx.createBuffer(1, len, audio.ctx.sampleRate);
      const data = audio.noiseBuffer.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;

      updateSoundUi();
      startMusicClock();
      return true;
    }

    function unlockAudio() {
      if (!initAudio()) return false;
      if (audio.ctx.state === "suspended") audio.ctx.resume();
      setMusicMode(desiredMusicMode());
      return true;
    }

    function audioTime() {
      return audio.ctx ? audio.ctx.currentTime : 0;
    }

    function updateSoundUi() {
      if (soundVolume) soundVolume.value = String(Math.round(audio.volume * 100));
      if (soundBtn) {
        soundBtn.classList.toggle("muted", audio.muted || audio.volume <= 0);
        soundBtn.innerHTML = audio.muted || audio.volume <= 0 ? "&#9834;" : "&#9835;";
      }

      if (audio.master) {
        const target = audio.muted ? 0 : audio.volume;
        audio.master.gain.setTargetAtTime(target, audioTime(), 0.015);
      }

      if (audio.musicGain) {
        audio.musicGain.gain.setTargetAtTime(audio.muted ? 0 : 0.24, audioTime(), 0.08);
      }
    }

    function setMuted(v) {
      audio.muted = !!v;
      localStorage.setItem("chessBrawlMuted", audio.muted ? "1" : "0");
      updateSoundUi();
      if (!audio.muted) setMusicMode(desiredMusicMode());
    }

    function setVolume(v) {
      audio.volume = clamp(v, 0, 1);
      if (audio.volume > 0 && audio.muted) audio.muted = false;
      localStorage.setItem("chessBrawlVolume", String(audio.volume));
      localStorage.setItem("chessBrawlMuted", audio.muted ? "1" : "0");
      updateSoundUi();
      if (!audio.muted && audio.volume > 0) setMusicMode(desiredMusicMode());
    }

    function canSound(key, gap = 0.018) {
      if (!audio.ctx || audio.muted || audio.volume <= 0) return false;

      const t = audioTime();
      const last = audio.recent.get(key) || -99;
      if (t - last < gap) return false;

      audio.recent.set(key, t);
      if (audio.recent.size > 120) {
        audio.recent = new Map(Array.from(audio.recent.entries()).slice(-70));
      }

      return true;
    }

    function out(node, x) {
      if (!audio.sfxGain) return;

      if (Number.isFinite(x) && audio.ctx.createStereoPanner) {
        const panner = audio.ctx.createStereoPanner();
        panner.pan.value = clamp((x - 480) / 520, -0.85, 0.85);
        node.connect(panner);
        panner.connect(audio.sfxGain);
      } else {
        node.connect(audio.sfxGain);
      }
    }

    function amp(when, dur, peak, attack = 0.006, release = 0.05, curve = "linear") {
      const g = audio.ctx.createGain();
      const t0 = audioTime() + when;
      const t1 = t0 + Math.max(0.002, attack);
      const t2 = t0 + Math.max(attack + 0.004, dur - release);
      const t3 = t0 + dur;

      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(Math.max(0.0001, peak), t1);
      if (curve === "hold") g.gain.setValueAtTime(Math.max(0.0001, peak), t2);
      else g.gain.exponentialRampToValueAtTime(Math.max(0.0001, peak * 0.35), t2);
      g.gain.exponentialRampToValueAtTime(0.0001, t3);
      return g;
    }

    function tone(freq, dur, gain = 0.08, opts = {}) {
      if (!audio.ctx) return;

      const when = opts.when || 0;
      const o = audio.ctx.createOscillator();
      const g = amp(when, dur, gain, opts.attack ?? 0.004, opts.release ?? 0.045, opts.curve);
      const t = audioTime() + when;

      o.type = opts.type || "sine";
      o.frequency.setValueAtTime(Math.max(20, freq), t);
      if (opts.to) {
        o.frequency.exponentialRampToValueAtTime(Math.max(20, opts.to), t + dur);
      }
      if (opts.detune) o.detune.value = opts.detune;

      o.connect(g);
      out(g, opts.x);
      o.start(t);
      o.stop(t + dur + 0.03);
    }

    function noise(dur, gain = 0.06, opts = {}) {
      if (!audio.ctx || !audio.noiseBuffer) return;

      const when = opts.when || 0;
      const src = audio.ctx.createBufferSource();
      const filter = audio.ctx.createBiquadFilter();
      const g = amp(when, dur, gain, opts.attack ?? 0.002, opts.release ?? 0.055, opts.curve);
      const t = audioTime() + when;

      src.buffer = audio.noiseBuffer;
      src.playbackRate.value = opts.rate || 1;
      filter.type = opts.filter || "bandpass";
      filter.frequency.setValueAtTime(opts.freq || 1200, t);
      if (opts.to) filter.frequency.exponentialRampToValueAtTime(Math.max(30, opts.to), t + dur);
      filter.Q.value = opts.q || 1.2;

      src.connect(filter);
      filter.connect(g);
      out(g, opts.x);
      src.start(t);
      src.stop(t + dur + 0.03);
    }

    function chord(notes, dur, gain, opts = {}) {
      notes.forEach((n, i) => {
        tone(n, dur, gain / Math.sqrt(notes.length), {
          ...opts,
          when: (opts.when || 0) + i * (opts.spread || 0.018),
          detune: (opts.detune || 0) + (i - 1) * 5
        });
      });
    }

    function musicTone(freq, dur, gain = 0.018, opts = {}) {
      if (!audio.ctx || !audio.musicGain || audio.muted || audio.volume <= 0) return;

      const when = opts.when || 0;
      const o = audio.ctx.createOscillator();
      const g = amp(when, dur, gain, opts.attack ?? 0.018, opts.release ?? 0.16, opts.curve);
      const t = audioTime() + when;

      o.type = opts.type || "triangle";
      o.frequency.setValueAtTime(Math.max(20, freq), t);
      if (opts.to) o.frequency.exponentialRampToValueAtTime(Math.max(20, opts.to), t + dur);
      if (opts.detune) o.detune.value = opts.detune;

      o.connect(g);
      g.connect(audio.musicGain);
      o.start(t);
      o.stop(t + dur + 0.05);
    }

    function musicNoise(dur, gain = 0.018, opts = {}) {
      if (!audio.ctx || !audio.musicGain || !audio.noiseBuffer || audio.muted || audio.volume <= 0) return;

      const when = opts.when || 0;
      const src = audio.ctx.createBufferSource();
      const filter = audio.ctx.createBiquadFilter();
      const g = amp(when, dur, gain, opts.attack ?? 0.01, opts.release ?? 0.12);
      const t = audioTime() + when;

      src.buffer = audio.noiseBuffer;
      filter.type = opts.filter || "lowpass";
      filter.frequency.setValueAtTime(opts.freq || 260, t);
      if (opts.to) filter.frequency.exponentialRampToValueAtTime(Math.max(30, opts.to), t + dur);
      filter.Q.value = opts.q || 0.7;

      src.connect(filter);
      filter.connect(g);
      g.connect(audio.musicGain);
      src.start(t);
      src.stop(t + dur + 0.05);
    }

    function duckMusic(amount = 0.48, dur = 0.2) {
      if (!audio.musicGain || audio.muted) return;

      const t = audioTime();
      audio.duckUntil = Math.max(audio.duckUntil, t + dur);
      audio.musicGain.gain.cancelScheduledValues(t);
      audio.musicGain.gain.setTargetAtTime(0.24 * amount, t, 0.012);
    }

    function restoreMusic() {
      if (!audio.musicGain || audio.muted) return;
      if (audioTime() > audio.duckUntil) {
        audio.musicGain.gain.setTargetAtTime(0.24, audioTime(), 0.12);
      }
    }

    function setMusicMode(mode) {
      if (!audio.ctx || audio.muted || audio.volume <= 0) return;
      if (audio.musicMode === mode) return;

      audio.musicMode = mode;
      audio.musicStep = 0;
      audio.nextMusicAt = audioTime() + 0.04;
    }

    function desiredMusicMode(gs = state.gameState) {
      const g = gs?.game;
      const status = gs?.lobby?.status;

      if (state.role === "menu" || !g || status !== "playing") return "menu";

      const fighters = Object.values(g.fighters || {});

      if (fighters.some((f) => f?.ultimateState?.type === "kingVerdict")) return "kingHunt";
      if (fighters.some((f) => f?.ultimateState?.type === "bishopSword")) return "bishopSword";
      if (fighters.some((f) => f?.promoted || f?.ultimateState?.type === "pawnUprising")) return "pawnPromotion";

      return "battle";
    }

    function musicBeat(mode) {
      if (mode === "menu") return 60 / 88;
      if (mode === "kingHunt") return 60 / 116;
      if (mode === "bishopSword") return 60 / 104;
      if (mode === "pawnPromotion") return 60 / 122;
      return 60 / 108;
    }

    function scheduleMusicStep(mode, step, when) {
      const beat = musicBeat(mode);

      if (mode === "menu") {
        const seq = [147, 220, 294, 349, 294, 220, 196, 220];
        musicTone(seq[step % seq.length], beat * 1.1, 0.014, { when, type: "triangle" });
        if (step % 4 === 0) musicTone(step % 8 === 0 ? 73 : 98, beat * 3.2, 0.012, { when, type: "sine" });
      } else if (mode === "battle") {
        const bass = [82, 82, 98, 73, 82, 110, 98, 73];
        if (step % 2 === 0) musicTone(bass[step % bass.length], beat * 1.5, 0.018, { when, type: "sawtooth", to: bass[step % bass.length] * 0.96 });
        if (step % 4 === 1) musicTone(330, beat * 0.9, 0.01, { when, type: "triangle" });
        if (step % 4 === 3) musicNoise(0.045, 0.01, { when, filter: "highpass", freq: 1800, to: 4200 });
      } else if (mode === "pawnPromotion") {
        const seq = [220, 330, 440, 660, 880, 660, 440, 330];
        musicTone(seq[step % seq.length], beat * 0.95, 0.02, { when, type: "triangle" });
        if (step % 4 === 0) musicTone(110, beat * 2.4, 0.013, { when, type: "sine" });
      } else if (mode === "bishopSword") {
        const seq = [247, 370, 494, 740, 988, 740, 494, 370];
        musicTone(seq[step % seq.length], beat * 1.15, 0.017, { when, type: "sine" });
        if (step % 2 === 0) musicTone(seq[step % seq.length] * 1.5, beat * 0.7, 0.009, { when: when + beat * 0.25, type: "triangle" });
      } else if (mode === "kingHunt") {
        const bass = [55, 55, 65, 55, 49, 55, 73, 65];
        musicTone(bass[step % bass.length], beat * 1.8, 0.026, { when, type: "sawtooth", to: bass[step % bass.length] * 0.72 });
        if (step % 4 === 2) musicNoise(0.09, 0.016, { when, filter: "lowpass", freq: 360, to: 90 });
        if (step % 8 === 7) musicTone(220, beat * 0.8, 0.012, { when, type: "square", to: 146 });
      }
    }

    function scheduleMusic() {
      if (!audio.ctx || !audio.musicMode || audio.muted || audio.volume <= 0) return;

      restoreMusic();

      const now = audioTime();
      const beat = musicBeat(audio.musicMode);

      while (audio.nextMusicAt < now + 0.28) {
        const when = Math.max(0, audio.nextMusicAt - now);
        scheduleMusicStep(audio.musicMode, audio.musicStep, when);
        audio.musicStep++;
        audio.nextMusicAt += beat;
      }
    }

    function startMusicClock() {
      if (audio.musicTimer) return;
      audio.musicTimer = setInterval(scheduleMusic, 90);
    }

    function soundUi(kind = "click") {
      unlockAudio();
      if (!canSound(`ui:${kind}`, 0.03)) return;

      if (kind === "select") {
        tone(520, 0.06, 0.035, { type: "triangle", to: 780 });
        tone(1040, 0.05, 0.018, { type: "sine", when: 0.035 });
      } else if (kind === "join") {
        chord([392, 587, 784], 0.12, 0.055, { type: "triangle", spread: 0.025 });
      } else if (kind === "leave") {
        tone(420, 0.1, 0.045, { type: "triangle", to: 190 });
      } else if (kind === "toggle") {
        tone(audio.muted ? 230 : 660, 0.08, 0.04, { type: "square", to: audio.muted ? 150 : 920 });
      } else {
        tone(620, 0.04, 0.03, { type: "triangle", to: 820 });
      }
    }

    function soundAttack(e) {
      if (!canSound(`attack:${e.piece}:${e.attack}`, 0.028)) return;

      const x = e.x;
      const heavy = /heavy|special|counter/i.test(e.attack || "");
      const piece = e.piece || "king";
      const baseGain = heavy ? 0.09 : 0.05;
      if (heavy) duckMusic(0.78, 0.12);

      if (piece === "rook") {
        noise(heavy ? 0.18 : 0.09, baseGain, { x, filter: "lowpass", freq: heavy ? 420 : 760, to: heavy ? 120 : 380, q: 0.8 });
        tone(heavy ? 92 : 130, heavy ? 0.16 : 0.08, heavy ? 0.08 : 0.04, { x, type: "sawtooth", to: heavy ? 55 : 90 });
      } else if (piece === "bishop") {
        noise(heavy ? 0.13 : 0.07, baseGain, { x, filter: "highpass", freq: 1800, to: 4200, q: 0.9 });
        tone(heavy ? 740 : 980, 0.08, 0.035, { x, type: "triangle", to: heavy ? 1180 : 1320 });
      } else if (piece === "knight") {
        noise(heavy ? 0.12 : 0.07, baseGain, { x, filter: "bandpass", freq: 1600, to: 620, q: 1.5 });
        tone(heavy ? 220 : 310, 0.07, 0.035, { x, type: "square", to: heavy ? 150 : 230 });
      } else if (piece === "pawn") {
        noise(0.06, 0.04, { x, filter: "bandpass", freq: 1100, q: 1.8 });
        tone(360, 0.045, 0.025, { x, type: "triangle", to: 510 });
      } else if (piece === "queen") {
        noise(heavy ? 0.18 : 0.1, baseGain, { x, filter: "highpass", freq: 1200, to: 5600, q: 0.75 });
        chord(heavy ? [330, 660, 990] : [494, 740, 988], heavy ? 0.16 : 0.09, heavy ? 0.07 : 0.04, { x, type: "triangle", spread: 0.012 });
      } else {
        noise(heavy ? 0.16 : 0.08, baseGain, { x, filter: "bandpass", freq: heavy ? 540 : 900, to: heavy ? 170 : 520, q: heavy ? 0.8 : 1.4 });
        tone(heavy ? 145 : 240, heavy ? 0.13 : 0.06, heavy ? 0.07 : 0.035, { x, type: heavy ? "sawtooth" : "triangle", to: heavy ? 80 : 320 });
      }
    }

    function soundHit(e) {
      if (!canSound(`hit:${e.ultimate ? "u" : "n"}`, 0.018)) return;

      const x = e.x;
      const dmg = clamp(Number(e.damage || 8), 2, 45);
      const power = clamp(dmg / 24, 0.25, 1.6);
      duckMusic(e.ultimate ? 0.28 : 0.48, e.ultimate ? 0.38 : 0.18);

      if (e.sword) {
        noise(0.1 + power * 0.04, 0.09 * power, { x, filter: "highpass", freq: 2600, to: 7600, q: 0.8 });
        tone(980, 0.075, 0.045 * power, { x, type: "square", to: 3200 });
        tone(1620, 0.055, 0.025 * power, { x, type: "sine", when: 0.018, to: 900 });
      } else if (e.ultimate) {
        noise(0.22, 0.16 * power, { x, filter: "lowpass", freq: 820, to: 90, q: 0.7 });
        chord([82, 164, 246], 0.24, 0.12 * power, { x, type: "sawtooth", spread: 0.01 });
      } else {
        noise(0.12, 0.11 * power, { x, filter: "lowpass", freq: 1100, to: 170, q: 0.9 });
        tone(105 + dmg * 2.4, 0.08, 0.055 * power, { x, type: "triangle", to: 72 });
      }
    }

    function soundUltimateStart(e) {
      if (!canSound(`ultimate:${e.ultType || e.piece}`, 0.2)) return;

      const x = e.x;
      const type = e.ultType || "";
      duckMusic(0.22, 0.65);
      noise(0.55, 0.08, { x, filter: "lowpass", freq: 180, to: 1400, q: 0.65, curve: "hold" });

      if (type.includes("king")) chord([73, 146, 220, 293], 0.55, 0.16, { x, type: "sawtooth", spread: 0.035 });
      else if (type.includes("rook")) chord([55, 110, 165], 0.48, 0.14, { x, type: "square", spread: 0.025 });
      else if (type.includes("bishop")) chord([247, 370, 740], 0.5, 0.12, { x, type: "triangle", spread: 0.025 });
      else if (type.includes("knight")) chord([196, 294, 392], 0.35, 0.11, { x, type: "square", spread: 0.018 });
      else if (type.includes("pawn")) chord([220, 330, 440, 660], 0.4, 0.12, { x, type: "triangle", spread: 0.018 });
      else chord([262, 392, 523, 784], 0.5, 0.13, { x, type: "triangle", spread: 0.02 });
    }

    function playFxSound(e) {

          }
          break;
        case "wall":
        case "wallBounce":
          if (canSound("wall", 0.06)) {
            noise(0.11, 0.08, { x: e.x, filter: "bandpass", freq: 950, to: 240 });
            tone(190, 0.09, 0.055, { x: e.x, type: "square", to: 110 });
          }
          break;
        case "roundEnd":
        case "roundWin":
          if (canSound("roundEnd", 0.4)) chord([196, 247, 330, 392], 0.42, 0.14, { type: "triangle", spread: 0.05 });
          break;
        default:
          break;
      }
    }

    function trackGameAudio(gs) {
      if (!audio.ctx || audio.muted || audio.volume <= 0) return;

      const g = gs?.game;
      const l = gs?.lobby;
      const m = gs?.match;
      const status = l?.status || "menu";
      setMusicMode(desiredMusicMode(gs));

      if (status !== state.lastAudioStatus) {
        if (status === "finished" && state.lastAudioStatus) soundUi("leave");
        state.lastAudioStatus = status;
      }

      if (!g || !m || status !== "playing") return;

      const roundKey = `${l?.id || "lobby"}:${m.round}:${m.whiteRounds}:${m.blackRounds}`;
      if (roundKey !== state.lastAudioRoundKey && g.tick < 20) {
        state.lastAudioRoundKey = roundKey;
        state.lastAudioSecond = null;
        if (canSound("roundStart", 0.4)) chord([220, 330, 440], 0.22, 0.09, { type: "triangle", spread: 0.035 });
      }

      const sec = Math.ceil((g.roundTime || 0) / 60);
      if (sec !== state.lastAudioSecond) {
        state.lastAudioSecond = sec;
        if (sec > 0 && sec <= 5 && !g.roundOver && canSound(`count:${sec}`, 0.2)) {
          tone(sec === 1 ? 880 : 660, 0.08, 0.05, { type: "square", to: sec === 1 ? 440 : 620 });
        }
      }
    }

    updateSoundUi();

    window.addEventListener("pointerdown", unlockAudio, { once: true });
    window.addEventListener("keydown", unlockAudio, { once: true });

    soundBtn.onclick = () => {
      unlockAudio();
      setMuted(!audio.muted);
      soundUi("toggle");
    };

    soundVolume.oninput = () => {
      unlockAudio();
      setVolume(Number(soundVolume.value) / 100);

      const t = performance.now();
      if (t - audio.previewAt > 120) {
        audio.previewAt = t;
        soundUi("click");
      }
    };

    function sendInput() {
      socket.emit("input", state.input);
    }

    function pressAction(name) {
      state.input.seq[name]++;
      sendInput();
    }

    const keys = {
      KeyA: ["hold", "left"],
      ArrowLeft: ["hold", "left"],
      KeyD: ["hold", "right"],
      ArrowRight: ["hold", "right"],
      KeyW: ["jump", "up"],
      ArrowUp: ["jump", "up"],
      Space: ["jump", "up"],
      KeyS: ["hold", "down"],
      ArrowDown: ["hold", "down"],
      KeyJ: ["action", "light"],
      KeyK: ["action", "heavy"],
      KeyL: ["action", "special"],
      KeyI: ["action", "ultimate"],
      ShiftLeft: ["action", "counter"],
      ShiftRight: ["action", "counter"]
    };

    window.addEventListener("keydown", (e) => {
      unlockAudio();

      if (e.code === "KeyH" && !e.repeat) {
        state.showHitboxes = !state.showHitboxes;
        debugNoticeEl.classList.toggle("show", state.showHitboxes);
        soundUi("click");
        return;
      }

      const k = keys[e.code];
      if (!k) return;
      e.preventDefault();

      if (k[0] === "hold") {
        state.input[k[1]] = true;
      }

      if (k[0] === "jump") {
        if (!state.input.up) pressAction("jump");
        state.input.up = true;
      }

      if (k[0] === "action" && !e.repeat) {
        pressAction(k[1]);
      }

      sendInput();
    });

    window.addEventListener("keyup", (e) => {
      const k = keys[e.code];
      if (!k) return;
      e.preventDefault();

      if (k[0] === "hold") state.input[k[1]] = false;
      if (k[0] === "jump") state.input.up = false;

      sendInput();
    });

    setInterval(() => {
      if (state.role !== "menu") sendInput();
    }, 1000 / 20);

    createBtn.onclick = () => {
      unlockAudio();
      soundUi("join");

      const n = nameInput.value.trim();
      const l = lobbyInput.value.trim();

      if (n) socket.emit("setName", n);
      socket.emit("setCharacter", state.selected);
      socket.emit("createLobby", l || undefined);
    };

    leaveBtn.onclick = () => {
      unlockAudio();
      soundUi("leave");
      socket.emit("leaveLobby");
      showMenu();
    };

    nameInput.onchange = () => socket.emit("setName", nameInput.value);

    socket.on("welcome", (data) => {
      state.id = data.id;
      state.characters = data.characters || {};
      renderCharacters();
    });

    socket.on("lobbyData", (data) => {
      state.lobbyData = data || {};
      state.characters = data.characters || state.characters;
      renderCharacters();
      renderLobbies();
      renderLeaderboard();
    });

    socket.on("enteredLobby", (data) => {
      state.role = data.role || "spectator";
      soundUi("join");
      showGame();
    });

    socket.on("leftLobby", () => {
      soundUi("leave");
      showMenu();
    });

    socket.on("gameState", (gs) => {
      state.gameState = gs;
      consumeFx(gs);
      updateHud(gs);
      trackGameAudio(gs);

      if (gs?.lobby?.status !== "waiting") showGame();
    });

    function renderCharacters() {
      characterGrid.innerHTML = "";

      for (const [key, ch] of Object.entries(state.characters)) {
        const card = document.createElement("div");
        card.className = `character-card ${state.selected === key ? "selected" : ""}`;
        card.innerHTML = `
          <div class="piece-big">${GLYPHS[key]}</div>
          <h3>${ch.name}</h3>
          <p>${ch.title}</p>
        `;
        card.onclick = () => {
          unlockAudio();
          soundUi("select");
          state.selected = key;
          socket.emit("setCharacter", key);
          renderCharacters();
        };
        characterGrid.appendChild(card);
      }
    }

    function renderLobbies() {
      const list = state.lobbyData.lobbies || [];
      lobbiesEl.innerHTML = "";

      if (!list.length) {
        const d = document.createElement("div");
        d.className = "lobby-card";
        d.innerHTML = `<div class="subtitle">No boards open yet.</div>`;
        lobbiesEl.appendChild(d);
        return;
      }

      for (const l of list) {
        const canJoin = l.status === "waiting" && !l.blackName;
        const d = document.createElement("div");
        d.className = "lobby-card";
        d.innerHTML = `
          <div class="lobby-top">
            <div class="lobby-name">${html(l.name || "Untitled")}</div>
            <div class="badge">${html(l.status)}</div>
          </div>
          <div class="subtitle">White: ${html(l.whiteName || "open")} · Black: ${html(l.blackName || "open")} · Watching: ${l.spectatorCount || 0}</div>
          <div class="lobby-actions">
            ${canJoin ? `<button data-join="${l.id}">Join</button>` : ""}
            <button class="secondary" data-watch="${l.id}">Watch</button>
          </div>
        `;
        lobbiesEl.appendChild(d);
      }

      lobbiesEl.querySelectorAll("[data-join]").forEach((b) => {

      lobbiesEl.querySelectorAll("[data-watch]").forEach((b) => {

    function renderLeaderboard() {
      leaderboardEl.innerHTML = "";
      const rows = state.lobbyData.leaderboard || [];

      if (!rows.length) {
        leaderboardEl.textContent = "No wins yet.";
        return;
      }

      rows.forEach((r, i) => {
        const d = document.createElement("div");
        d.textContent = `${i + 1}. ${r.name}: ${r.score}`;
        leaderboardEl.appendChild(d);
      });
    }

    function showGame() {
      menu.style.display = "none";
      gameWrap.style.display = "grid";
      setMusicMode(desiredMusicMode());
    }

    function showMenu() {
      menu.style.display = "grid";
      gameWrap.style.display = "none";
      state.role = "menu";
      state.gameState = null;
      setMusicMode("menu");
    }

    function updateHud(gs) {
      const g = gs?.game;
      const l = gs?.lobby;
      const m = gs?.match;

      if (!g?.fighters) {
        messageEl.textContent = l?.message || "Waiting...";
        messageEl.classList.add("show");
        return;
      }

      const w = g.fighters.white;
      const b = g.fighters.black;

      whiteNameEl.textContent = l?.whiteName || w.name || "White";
      blackNameEl.textContent = l?.blackName || b.name || "Black";
      whitePieceEl.textContent = w.characterName || pieceOf(w);
      blackPieceEl.textContent = b.characterName || pieceOf(b);

      whiteHpEl.style.width = `${pct(w.hp, w.maxHp)}%`;
      blackHpEl.style.width = `${pct(b.hp, b.maxHp)}%`;
      whiteMeterEl.style.width = `${pct(w.stamina, w.maxStamina)}%`;
      blackMeterEl.style.width = `${pct(b.stamina, b.maxStamina)}%`;
      whitePromoEl.style.width = `${pct(w.promotion || 0, 140)}%`;
      blackPromoEl.style.width = `${pct(b.promotion || 0, 140)}%`;
      whiteUltEl.style.width = `${pct(w.ultimate || 0, w.ultimateMax || 100)}%`;
      blackUltEl.style.width = `${pct(b.ultimate || 0, b.ultimateMax || 100)}%`;

      roundTextEl.textContent = `Round ${m?.round || 1} · ${m?.whiteRounds || 0}-${m?.blackRounds || 0}`;
      timerEl.textContent = String(Math.ceil((g.roundTime || 0) / 60)).padStart(2, "0");

      if (g.roundOver || l?.status === "finished") {
        messageEl.textContent = l.message || "";
        messageEl.classList.add("show");
      } else {
        messageEl.classList.remove("show");
      }
    }

    function consumeFx(gs) {
      const fx = gs?.game?.effects || [];

      for (const e of fx) {
        if (!e.id || state.seenFx.has(e.id)) continue;
        state.seenFx.add(e.id);

        if (state.seenFx.size > 900) {
          state.seenFx = new Set(Array.from(state.seenFx).slice(-450));
        }

        playFxSound(e);

        if (e.type === "hit") {
          if (e.sword) {
            metalSparks(e.x, e.y, e.dir || 1, 34);
            addFx("swordImpact", e.x, e.y, { life: 22, dir: e.dir || 1 });
            state.shake = Math.max(state.shake, 13);
            state.flash = Math.max(state.flash, .08);
          } else {
            burst(e.x, e.y, e.ultimate ? "255,211,71" : "255,235,200", e.ultimate ? 54 : 24, e.ultimate ? 13 : 8);
            addFx(e.ultimate ? "ultimateImpact" : "impact", e.x, e.y, { life: e.ultimate ? 30 : 18 });
            state.shake = Math.max(state.shake, e.ultimate ? 16 : 8);
            state.flash = Math.max(state.flash, e.ultimate ? .2 : .1);
          }
        }

        if (e.type === "grab") {
          burst(e.x, e.y, "255,255,255", 36, 10);
          addFx("grab", e.x, e.y, { life: 24, dir: e.dir });
          state.shake = Math.max(state.shake, 12);
        }

        if (e.type === "counterStart") {
          addFx("counterStart", e.x, e.y, { life: 22, piece: e.piece, dir: e.dir });
        }

        if (e.type === "counterSuccess") {
          addFx("counterSuccess", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,255,255", 48, 11);
          state.shake = Math.max(state.shake, 13);
          state.flash = Math.max(state.flash, .2);
        }

        if (e.type === "ultimateStart") {
          addFx("ultimateStart", e.x, e.y, { life: 80, piece: e.piece, dir: e.dir, ultType: e.ultType });
          burst(e.x, e.y, "255,211,71", 90, 12);
          state.shake = Math.max(state.shake, 16);
          state.flash = Math.max(state.flash, .18);
        }

        if (e.type === "bishopSwordAwaken") {
          addFx("bishopSwordAwaken", e.x, e.y, { life: 80, dir: e.dir });
          burst(e.x, e.y, "255,230,120", 80, 10);
          state.shake = Math.max(state.shake, 13);
          state.flash = Math.max(state.flash, .18);
        }

        if (e.type === "bishopSwordReady") {
          addFx("bishopSwordReady", e.x, e.y, { life: 46, dir: e.dir });
          metalSparks(e.x, e.y, e.dir || 1, 36);
        }

        if (e.type === "bishopSwordPulse") {
          addFx("bishopSwordPulse", e.x, e.y, { life: 18, dir: e.dir });
        }

        if (e.type === "bishopSwordEnd") {
          addFx("bishopSwordEnd", e.x, e.y, { life: 34, dir: e.dir });
        }

        if (e.type === "bishopSwordMove") {
          addFx("bishopSwordMove", e.x, e.y, {
            life: 16,
            attack: e.attack,
            aim: e.aim,
            dir: e.dir
          });
        }

        if (e.type === "bishopSwordParry") {
          addFx("bishopSwordParry", e.x, e.y, { life: 34, dir: e.dir });
          metalSparks(e.x, e.y, e.dir || 1, 58);
          state.shake = Math.max(state.shake, 15);
          state.flash = Math.max(state.flash, .14);
        }

        if (e.type === "ultimateLock") {
          addFx("ultimateLock", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          state.shake = Math.max(state.shake, 8);
        }

        if (e.type === "ultimateBurst") {
          addFx("ultimateBurst", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 56, 13);
          state.shake = Math.max(state.shake, 13);
        }

        if (e.type === "rookShell") {
          addFx("rookShell", e.x, e.y, {
            life: e.timer || 22,
            piece: e.piece,
            dir: e.dir,
            reach: e.reach || 0,
            aimY: e.aimY || 0,
            charge: !!e.charge,
            beamStart: !!e.beamStart
          });

          if (e.charge) {
            burst(e.x, e.y, "255,215,70", 42, 8);
            state.shake = Math.max(state.shake, 6);
          }

          if (e.beamStart) {
            burst(e.x, e.y, "255,245,190", 34, 7);
            state.flash = Math.max(state.flash, .08);
          }
        }

        if (e.type === "kingCrownBurst") {
          addFx("kingCrownBurst", e.x, e.y, { life: e.timer || 90, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,215,70", 120, 18);
          state.shake = Math.max(state.shake, 22);
          state.flash = Math.max(state.flash, .22);
        }

        if (e.type === "kingGrabFlash") {
          addFx("kingGrabFlash", e.x, e.y, { life: e.timer || 34, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,245,190", 72, 12);
          state.shake = Math.max(state.shake, 14);
        }

        if (e.type === "kingSmash") {
          addFx("kingSmash", e.x, e.y, { life: e.timer || 32, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,215,70", 80, 13);
          state.shake = Math.max(state.shake, 18);
        }

        if (e.type === "kingSlam") {
          addFx("kingSlam", e.x, e.y, { life: e.timer || 52, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,215,70", 130, 20);
          state.shake = Math.max(state.shake, 26);
          state.flash = Math.max(state.flash, .18);
        }

        if (e.type === "kingShockwave") {
          addFx("kingShockwave", e.x, e.y, { life: e.timer || 60, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,245,190", 100, 14);
          state.shake = Math.max(state.shake, 24);
        }

        if (e.type === "bishopTrail") {
          addFx("bishopTrail", e.x, e.y, { life: 18 });
        }

        if (e.type === "bishopFinish") {
          addFx("bishopFinish", e.x, e.y, { life: 30, dir: e.dir });
        }

        if (e.type === "knightWindup") {
          addFx("knightWindup", e.x, e.y, { life: 20, piece: e.piece, dir: e.dir });
        }

        if (e.type === "knightBurst") {
          addFx("knightBurst", e.x, e.y, { life: 16, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 34, 8);
        }

        if (e.type === "knightSlam") {
          addFx("knightSlam", e.x, e.y, { life: 36, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 48, 11);
          state.shake = Math.max(state.shake, 14);
        }

        if (e.type === "pawnPromoteBurst") {
          addFx("pawnPromoteBurst", e.x, e.y, { life: 46, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 70, 10);
        }

        if (e.type === "queenFinisherStart") {
          addFx("queenFinisherStart", e.x, e.y, { life: 42, hits: e.hits || 0, dir: e.dir });
        }

        if (e.type === "queenFinisher") {
          addFx("queenFinisher", e.x, e.y, { life: 55, hits: e.hits || 0, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 110, 15);
          state.shake = Math.max(state.shake, 18);
          state.flash = Math.max(state.flash, .25);
        }

        if (e.type === "dash") addFx("dash", e.x, e.y, { life: 16, dir: e.dir });

        if (e.type === "wallBounce") {
          burst(e.x, e.y, "255,255,255", 18, 5);
          state.shake = Math.max(state.shake, 9);
        }

        if (e.type === "queenEnd") addFx("queenEnd", e.x, e.y, { life: 34 });
        if (e.type === "roundWin") addFx("roundWin", e.x, e.y, { life: 64 });
      }
    }

    function addParticle(x, y, o = {}) {
      if (!Number.isFinite(x)) x = 480;
      if (!Number.isFinite(y)) y = 270;

      state.particles.push({
        x,
        y,
        vx: o.vx ?? (Math.random() - .5) * 5,
        vy: o.vy ?? (Math.random() - .5) * 5,
        r: o.r ?? 2 + Math.random() * 5,
        life: o.life ?? 20,
        max: o.life ?? 20,
        color: o.color ?? "255,255,255",
        g: o.g ?? .08
      });

      if (state.particles.length > 900) {
        state.particles.splice(0, state.particles.length - 900);
      }
    }

    function burst(x, y, color, count, power) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * power;
        addParticle(x, y, {
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - Math.random() * 1.8,
          color,
          life: 14 + Math.random() * 22,
          r: 2 + Math.random() * 6
        });
      }
    }

    function metalSparks(x, y, dir = 1, count = 18) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) return;

      for (let i = 0; i < count; i++) {
        const a = Math.PI + (Math.random() - .5) * 1.4;
        const s = 2 + Math.random() * 8;

        addParticle(x, y, {
          vx: Math.cos(a) * s * dir,
          vy: Math.sin(a) * s - Math.random() * 3,
          color: Math.random() > .35 ? "255,220,120" : "255,255,235",
          life: 10 + Math.random() * 14,
          r: 1.2 + Math.random() * 2.2,
          g: .18
        });
      }
    }

    function addFx(type, x, y, data = {}) {
      if (!Number.isFinite(x)) x = 480;
      if (!Number.isFinite(y)) y = 270;

      state.localFx.push({
        type,
        x,
        y,
        life: data.life || 24,
        max: data.life || 24,
        ...data
      });

      if (state.localFx.length > 280) {
        state.localFx.splice(0, state.localFx.length - 280);
      }
    }

    function rr(x, y, w, h, r) {
      if (![x, y, w, h, r].every(Number.isFinite)) return;
      if (w <= 0 || h <= 0) return;

      r = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function checker(x, y, w, h, tile, a, b, alpha = 1, ox = 0, oy = 0) {
      if (![x, y, w, h, tile].every(Number.isFinite)) return;
      if (tile <= 0 || w <= 0 || h <= 0) return;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();

      for (let yy = y - tile; yy < y + h + tile; yy += tile) {
        for (let xx = x - tile; xx < x + w + tile; xx += tile) {
          const ix = Math.floor((xx - x + ox) / tile);
          const iy = Math.floor((yy - y + oy) / tile);
          ctx.fillStyle = (ix + iy) % 2 ? b : a;
          ctx.fillRect(xx, yy, tile, tile);
        }
      }

      ctx.restore();
    }

    function drawBackground(game) {
      const floor = game?.floorY || 430;

      const bg = ctx.createLinearGradient(0, 0, 0, 540);
      bg.addColorStop(0, "#ead8bb");
      bg.addColorStop(.45, "#c8a073");
      bg.addColorStop(1, "#71441f");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 960, 540);

      checker(42, 38, 876, 245, 64, "#f1ddbd", "#a16b3c", .72, state.t * .035, state.t * .035);

      ctx.strokeStyle = "rgba(80,45,18,.68)";
      ctx.lineWidth = 10;
      ctx.strokeRect(42, 38, 876, 245);

      ctx.save();
      ctx.globalAlpha = .15;
      ctx.font = "900 46px Georgia";
      ctx.textAlign = "center";
      ctx.fillStyle = "#5b3218";
      for (let i = 0; i < 12; i++) {
        const g = ["♔", "♕", "♖", "♗", "♘", "♙"][i % 6];
        ctx.fillText(g, 58 + i * 82, 174 + Math.sin(state.t * .025 + i) * 9);
      }
      ctx.restore();

      checker(0, floor - 4, 960, 540 - floor + 4, 60, "#f7e5c9", "#9f6b3a");

    function drawHitboxes(f) {
      if (!state.showHitboxes || !f) return;

      ctx.save();
      ctx.globalAlpha = .24;
      ctx.fillStyle = f.side === "white" ? "rgba(255,255,255,.55)" : "rgba(0,0,0,.55)";
      ctx.fillRect(f.x, f.y, f.w, f.h);

      ctx.globalAlpha = .95;
      ctx.strokeStyle = f.side === "white" ? "#fff" : "#111";
      ctx.lineWidth = 2;
      ctx.strokeRect(f.x, f.y, f.w, f.h);

      ctx.restore();
    }

    function drawFighter(f) {
      if (!f || !Number.isFinite(f.x) || !Number.isFinite(f.y)) return;

      const c = center(f);
      const m = mat(f);
      const bob = Math.sin(state.t * .08 + (f.side === "white" ? 0 : 2)) * (f.grounded ? 1 : .4);

      shadow(f);

      ctx.save();
      ctx.globalAlpha = f.side === "white" ? .1 : .18;
      ctx.fillStyle = f.side === "white" ? "rgba(255,255,255,.22)" : "rgba(0,0,0,.26)";
      ctx.beginPath();
      ctx.ellipse(c.x, f.y + f.h + 9, f.w * .85, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawUltimateVisual(f);
      if (isBishopSword(f) && !f.attack) drawBishopIdleSword(f);
      drawWeapon(f);

      ctx.save();
      if (f.hurt > 0) ctx.translate((Math.random() - .5) * 2.2, 0);
      drawPiece(f, c.x, c.y + bob, 1 + (f.attack || f.ultimateState ? .018 : 0), 1);

      if (f.armor > 0) {
        ctx.globalAlpha = .34;
        ctx.strokeStyle = m.magic;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, f.w * .74, f.h * .58, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (isBishopSword(f)) {
        ctx.globalAlpha = .34 + Math.sin(state.t * .18) * .08;
        ctx.strokeStyle = "rgba(255,230,150,.85)";
        ctx.lineWidth = 2.5;
        ctx.shadowColor = "rgba(255,215,70,.35)";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, f.w * 1.05, f.h * .78, 0, 0, Math.PI * 2);
        ctx.stroke();
      } else if ((f.ultimate || 0) >= (f.ultimateMax || 100)) {
        ctx.globalAlpha = .4 + Math.sin(state.t * .18) * .14;
        ctx.strokeStyle = m.ult;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, f.w * .94, f.h * .72, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();

      ctx.save();
      ctx.font = "700 11px system-ui";
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(255,255,255,.92)";
      ctx.shadowColor = "rgba(0,0,0,.8)";
      ctx.shadowBlur = 6;
      ctx.fillText(f.name || "", c.x, f.y - 12);
      ctx.restore();

      drawCooldownDots(f);
      drawHitboxes(f);
    }

    function drawCooldownDots(f) {
      const c = center(f);
      const y = f.y + f.h + 18;
      const vals = [f.lightCd || 0, f.heavyCd || 0, f.specialCd || 0, f.counterCd || 0, f.ultimateCd || 0];
      const max = [20, 60, 250, 150, 360];

      ctx.save();
      for (let i = 0; i < 5; i++) {
        const x = c.x - 36 + i * 18;
        const ready = vals[i] <= 0;

        ctx.globalAlpha = ready ? .85 : .35;
        ctx.fillStyle =
          i === 4 && ready ? "#ffd84e" :
          i === 3 && ready ? "#ffe6a0" :
          ready ? "#fff" :
          "rgba(255,255,255,.3)";
        ctx.beginPath();
        ctx.arc(x, y, i === 4 ? 5.4 : 4.5, 0, Math.PI * 2);
        ctx.fill();

        if (!ready) {
          ctx.strokeStyle = "rgba(0,0,0,.55)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, 6.2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(vals[i] / max[i], 0, 1));
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      for (const p of state.particles) {
        const a = clamp(p.life / p.max, 0, 1);
        ctx.globalAlpha = a;
        ctx.fillStyle = `rgba(${p.color},${a})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.g;
        p.vx *= .985;
        p.life--;
      }
      ctx.restore();

      state.particles = state.particles.filter((p) => p.life > 0);
    }

    function drawOneLocalFx(p) {
      const max = p.max || p.life || 1;
      const q = 1 - p.life / max;
      const a = p.life / max;

      ctx.save();

      if (p.type === "rookShell") {
        const d = p.dir || 1;

        if (p.charge) {
          ctx.globalAlpha = a * .8;
          ctx.fillStyle = "rgba(255,215,70,.24)";
          ctx.beginPath();
          ctx.arc(p.x, p.y, 18 + q * 70, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = a;
          ctx.strokeStyle = "rgba(255,245,190,.95)";
          ctx.lineWidth = 5 * a;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 12 + q * 48, 0, Math.PI * 2);
          ctx.stroke();

          for (let i = 0; i < 5; i++) {
            const ang = -Math.PI / 2 + i * Math.PI / 4 + q * 1.4;
            ctx.globalAlpha = a * .75;
            ctx.strokeStyle = "rgba(255,235,130,.8)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(p.x + Math.cos(ang) * 12, p.y + Math.sin(ang) * 12);
            ctx.lineTo(p.x + Math.cos(ang) * (45 + q * 40), p.y + Math.sin(ang) * (45 + q * 40));
            ctx.stroke();
          }
        } else if (p.beamStart) {
          ctx.globalAlpha = a;
          ctx.fillStyle = "rgba(255,245,190,.82)";
          ctx.beginPath();
          ctx.arc(p.x, p.y, 16 + q * 18, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = a * .55;
          ctx.fillStyle = "rgba(255,215,70,.45)";
          ctx.beginPath();
          ctx.ellipse(p.x + d * (28 + q * 38), p.y, 45 + q * 35, 18 + q * 8, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = a * .9;
          ctx.strokeStyle = "rgba(255,250,210,.95)";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(p.x - d * 10, p.y);
          ctx.lineTo(p.x + d * (60 + q * 70), p.y);
          ctx.stroke();
        } else {
          ctx.globalAlpha = a * .65;
          ctx.fillStyle = "rgba(255,215,70,.28)";
          ctx.beginPath();
          ctx.arc(p.x + d * q * 42, p.y, 22 + q * 32, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
        return;
      }

      if (p.type === "kingCrownBurst") {
        ctx.globalAlpha = a * .42;
        ctx.fillStyle = "rgba(255,215,70,.42)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 42 + q * 190, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 10 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 28 + q * 150, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = a;
        ctx.font = "900 96px Georgia";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,215,70,.95)";
        ctx.strokeStyle = "rgba(60,35,10,.95)";
        ctx.lineWidth = 5;
        ctx.strokeText("♔", p.x, p.y - 95 * q);
        ctx.fillText("♔", p.x, p.y - 95 * q);

        for (let i = 0; i < 8; i++) {
          const ang = i * Math.PI / 4 + q * .65;
          ctx.globalAlpha = a * .75;
          ctx.strokeStyle = "rgba(255,245,190,.85)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(p.x + Math.cos(ang) * 35, p.y + Math.sin(ang) * 35);
          ctx.lineTo(p.x + Math.cos(ang) * (110 + q * 80), p.y + Math.sin(ang) * (110 + q * 80));
          ctx.stroke();
        }

        ctx.restore();
        return;
      }

      if (p.type === "kingGrabFlash") {
        ctx.globalAlpha = a * .78;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 8 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 28 + q * 70, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = a * .45;
        ctx.fillStyle = "rgba(255,215,70,.55)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 22 + q * 58, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

      if (p.type === "kingSmash") {
        ctx.globalAlpha = a * .75;
        ctx.fillStyle = "rgba(255,215,70,.42)";
        ctx.beginPath();
        ctx.ellipse(p.x, p.y + 16 * q, 74 + q * 80, 26 + q * 32, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 7 * a;
        ctx.beginPath();
        ctx.moveTo(p.x - 95 - q * 35, p.y - 28);
        ctx.lineTo(p.x + 95 + q * 35, p.y + 36);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (p.type === "kingSlam") {
        ctx.globalAlpha = a * .65;
        ctx.fillStyle = "rgba(255,215,70,.45)";
        ctx.beginPath();
        ctx.ellipse(p.x, p.y + 28, 90 + q * 190, 38 + q * 74, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 12 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 36 + q * 140, 0, Math.PI * 2);
        ctx.stroke();

        for (let i = 0; i < 7; i++) {
          const x = p.x + (i - 3) * 34;
          ctx.globalAlpha = a * .65;
          ctx.fillStyle = "rgba(255,245,190,.8)";
          ctx.beginPath();
          ctx.moveTo(x, p.y + 54 + q * 20);
          ctx.lineTo(x + 13, p.y + 100 + q * 70);
          ctx.lineTo(x - 13, p.y + 100 + q * 70);
          ctx.closePath();
          ctx.fill();
        }

        ctx.restore();
        return;
      }

      if (p.type === "kingShockwave") {
        ctx.globalAlpha = a * .55;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 14 * a;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, 60 + q * 330, 20 + q * 92, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = a * .25;
        ctx.fillStyle = "rgba(255,215,70,.6)";
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, 70 + q * 370, 24 + q * 108, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

            if (p.type === "hit") {
        ctx.globalAlpha = a;
        ctx.fillStyle = p.ultimate ? "rgba(255,230,120,.75)" : "rgba(255,255,255,.65)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 10 + q * (p.ultimate ? 64 : 34), 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a * .9;
        ctx.strokeStyle = p.ultimate ? "rgba(255,245,190,.9)" : "rgba(255,255,255,.75)";
        ctx.lineWidth = p.ultimate ? 7 * a : 4 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 16 + q * (p.ultimate ? 82 : 42), 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (p.type === "attack") {
        ctx.globalAlpha = a * .48;
        ctx.fillStyle = "rgba(255,245,190,.32)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 24 + q * 46, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a * .8;
        ctx.strokeStyle = "rgba(255,245,190,.75)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 16 + q * 34, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (p.type === "armor") {
        ctx.globalAlpha = a * .75;
        ctx.strokeStyle = "rgba(170,170,170,.95)";
        ctx.lineWidth = 4 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 30 + q * 24, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (p.type === "grab") {
        ctx.globalAlpha = a * .75;
        ctx.strokeStyle = "rgba(255,245,190,.95)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 22 + q * 48, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = a * .45;
        ctx.fillStyle = "rgba(255,215,70,.38)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 16 + q * 36, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

      if (p.type === "counterReady" || p.type === "counterFire") {
        ctx.globalAlpha = a * .7;
        ctx.strokeStyle = p.type === "counterFire" ? "rgba(255,245,190,.95)" : "rgba(255,215,70,.85)";
        ctx.lineWidth = p.type === "counterFire" ? 7 * a : 4 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 32 + q * 58, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (p.type === "dash") {
        ctx.globalAlpha = a * .38;
        ctx.fillStyle = "rgba(255,245,190,.55)";
        ctx.beginPath();
        ctx.ellipse(p.x - (p.dir || 1) * q * 70, p.y, 52 + q * 42, 18 + q * 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

      if (p.type === "land") {
        ctx.globalAlpha = a * .45;
        ctx.fillStyle = "rgba(90,55,25,.55)";
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, 34 + q * 62, 7 + q * 9, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

      if (p.type === "wall") {
        ctx.globalAlpha = a * .6;
        ctx.strokeStyle = "rgba(255,245,190,.75)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y - 46 - q * 24);
        ctx.lineTo(p.x, p.y + 46 + q * 24);
        ctx.stroke();

        ctx.restore();
        return;
      }

      if (
        p.type === "ultimateStart" ||
        p.type === "ultimateLock" ||
        p.type === "bishopSwordAwaken" ||
        p.type === "bishopSwordReady" ||
        p.type === "bishopSwordPulse" ||
        p.type === "bishopSwordEnd" ||
        p.type === "knightWindup" ||
        p.type === "knightBurst" ||
        p.type === "knightSlam" ||
        p.type === "pawnPromoteBurst" ||
        p.type === "queenFinisherStart" ||
        p.type === "queenFinisher"
      ) {
        ctx.globalAlpha = a * .45;
        ctx.fillStyle = "rgba(255,215,70,.45)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 28 + q * 92, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = a * .9;
        ctx.strokeStyle = "rgba(255,245,190,.9)";
        ctx.lineWidth = 5 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 22 + q * 120, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
        return;
      }

      ctx.globalAlpha = a * .5;
      ctx.fillStyle = "rgba(255,255,255,.6)";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10 + q * 20, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawLocalFx() {
      for (const fx of state.localFx) {
        drawOneLocalFx(fx);
        fx.life--;
      }

      state.localFx = state.localFx.filter((fx) => fx.life > 0);
    }

    function drawWaiting() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.18)";
      ctx.fillRect(0, 0, 960, 540);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "1000 54px system-ui";
      ctx.fillStyle = "rgba(70,40,20,.95)";
      ctx.shadowColor = "rgba(255,255,255,.5)";
      ctx.shadowBlur = 12;
      ctx.fillText("WAITING FOR BOARD", 480, 238);

      ctx.font = "500 18px system-ui";
      ctx.fillStyle = "rgba(70,40,20,.78)";
      ctx.fillText("Weapon-first fantasy chess combat.", 480, 286);
      ctx.restore();
    }

    function drawRoundOverlay(game) {
      if (!game.roundWinner) return;

      ctx.save();
      ctx.fillStyle = "rgba(90,60,34,.22)";
      ctx.fillRect(0, 0, 960, 540);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "1000 66px system-ui";
      ctx.fillStyle = game.roundWinner === "white" ? "#fff7ec" : "#2b1a10";
      ctx.shadowColor = "rgba(0,0,0,.35)";
      ctx.shadowBlur = 20;
      ctx.fillText(`${game.roundWinner.toUpperCase()} TAKES THE ROUND`, 480, 270);
      ctx.restore();
    }

    function loop() {
      state.t++;

      const gs = state.gameState;
      const game = gs?.game;

      if (state.shake > 0) state.shake *= .82;
      if (state.flash > 0) state.flash *= .86;

      ctx.save();

      const shake = Math.max(state.shake, game?.shake || 0);
      ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake * .7);

      drawBackground(game);

      if (!game?.fighters) {
        drawWaiting();
        ctx.restore();
        requestAnimationFrame(loop);
        return;
      }

      const w = game.fighters.white;
      const b = game.fighters.black;

      if (w.x < b.x) {
        drawFighter(w);
        drawFighter(b);
      } else {
        drawFighter(b);
        drawFighter(w);
      }

      drawParticles();
      drawLocalFx();

      ctx.restore();

      if (state.flash > 0) {
        ctx.save();
        ctx.globalAlpha = state.flash;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, 960, 540);
        ctx.restore();
      }

      if (game.roundOver) drawRoundOverlay(game);

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
