<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chess Brawl</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --text: #fff6e7;
      --muted: #ead8bb;
      --gold: #ffd978;
      --brown: #4e2d16;
      --cream: #f2dfbd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: #3b2110;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #9b673a, #4b2914);
      box-shadow: 0 12px 24px rgba(0,0,0,.28);
    }

    button.secondary {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.15);
    }

    button.danger {
      background: linear-gradient(135deg, #7a2230, #321b13);
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      color: white;
      outline: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,221,160,.18), transparent 30%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,.08), transparent 24%),
        linear-gradient(180deg, #805834, #32190c);
    }

    #menu {
      width: min(1200px, 100%);
      height: min(760px, 100%);
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 18px;
    }

    .panel {
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.15);
      overflow: hidden;
      background: rgba(55, 31, 14, .76);
      box-shadow: 0 28px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 26px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 18px;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -100%;
      background:
        linear-gradient(45deg, rgba(242,223,189,.18) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(242,223,189,.18) 75%),
        linear-gradient(45deg, transparent 75%, rgba(70,38,18,.26) 75%),
        linear-gradient(45deg, rgba(70,38,18,.26) 25%, transparent 25%);
      background-size: 86px 86px;
      background-position: 0 0, 43px 43px, 0 0, 43px 43px;
      transform: rotate(-14deg);
      animation: boardMove 16s linear infinite;
      opacity: .9;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 40% 18%, rgba(255,255,255,.12), transparent 32%),
        linear-gradient(180deg, rgba(55,31,14,.18), rgba(35,17,7,.72));
      pointer-events: none;
    }

    @keyframes boardMove {
      to {
        background-position: 172px 172px, 215px 215px, 172px 172px, 215px 215px;
      }
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0;
      font-size: clamp(44px, 6vw, 86px);
      line-height: .9;
      letter-spacing: -.075em;
      font-weight: 1000;
    }

    .title span {
      color: var(--gold);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .setup {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .character-card {
      min-height: 188px;
      padding: 12px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.15);
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
      position: relative;
      overflow: hidden;
    }

    .character-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.36);
    }

    .character-card.selected {
      border-color: rgba(255,217,120,.95);
      box-shadow: inset 0 0 0 1px rgba(255,217,120,.45), 0 0 30px rgba(255,217,120,.13);
    }

    .piece-big {
      height: 104px;
      display: grid;
      place-items: center;
      font: 900 90px Georgia, "Times New Roman", serif;
      color: #fff4df;
      text-shadow: 0 3px 0 rgba(60,36,17,.75), 0 14px 24px rgba(0,0,0,.38);
    }

    .character-card h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .character-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.28;
      color: var(--muted);
    }

    .side-panel {
      padding: 22px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.03em;
    }

    .badge {
      display: inline-block;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.09);
      color: var(--muted);
      font-size: 11px;
    }

    .lobbies {
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .lobby-card {
      display: grid;
      gap: 8px;
      padding: 13px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
    }

    .lobby-top,
    .lobby-actions {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .lobby-actions button {
      flex: 1;
      padding: 8px 10px;
      font-size: 13px;
    }

    .lobby-name {
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard {
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 6px;
    }

    #gameWrap {
      display: none;
      width: min(100vw, 1280px);
      height: min(100vh, 760px);
      place-items: center;
    }

    #gameFrame {
      position: relative;
      width: min(100%, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 35px 100px rgba(0,0,0,.58);
      background: #c8a57a;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #topHud {
      position: absolute;
      inset: 16px 18px auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: start;
    }

    .hudSide {
      display: grid;
      gap: 7px;
    }

    .hudSide.right {
      text-align: right;
    }

    .nameLine {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }

    .hudSide.right .nameLine {
      justify-content: flex-end;
    }

    .barShell,
    .meterShell,
    .ultimateShell {
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.36);
      box-shadow: inset 0 2px 8px rgba(0,0,0,.4);
    }

    .barShell {
      height: 18px;
    }

    .meterShell {
      height: 8px;
    }

    .ultimateShell {
      height: 11px;
      border-color: rgba(255,220,120,.38);
      background: rgba(0,0,0,.5);
      box-shadow: 0 0 12px rgba(255,217,120,.12), inset 0 2px 8px rgba(0,0,0,.45);
    }

    .bar,
    .meter {
      height: 100%;
      border-radius: 999px;
      transition: width .08s linear;
    }

    .whiteHp {
      background: linear-gradient(90deg, #fff7dc, #d8c49a, #8b6d45);
    }

    .blackHp {
      background: linear-gradient(90deg, #646464, #222, #050505);
    }

    .stamina {
      background: linear-gradient(90deg, #f4f0df, #a9936f);
    }

    .promo {
      background: linear-gradient(90deg, #ffe36d, #d8a63b);
    }

    .ultimate {
      background: linear-gradient(90deg, #fff1a8, #ffd347, #f2952e);
      box-shadow: 0 0 16px rgba(255,211,71,.65);
    }

    #centerHud {
      text-align: center;
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    #roundText {
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: rgba(255,255,255,.92);
    }

    #timer {
      min-width: 78px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 24px;
      font-weight: 1000;
    }

    #message {
      position: absolute;
      left: 50%;
      top: 24%;
      transform: translateX(-50%);
      max-width: 80%;
      min-width: 260px;
      text-align: center;
      padding: 14px 20px;
      border-radius: 20px;
      background: rgba(60,34,17,.55);
      border: 1px solid rgba(255,255,255,.16);
      font-size: clamp(18px, 3vw, 34px);
      font-weight: 1000;
      letter-spacing: -.04em;
      text-shadow: 0 2px 18px rgba(0,0,0,.8);
      opacity: 0;
      transition: opacity .18s ease;
    }

    #message.show {
      opacity: 1;
    }

    #debugNotice {
      position: absolute;
      right: 18px;
      top: 130px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.2);
      color: #ffe9a8;
      font-size: 12px;
      opacity: 0;
      transition: opacity .15s ease;
    }

    #debugNotice.show {
      opacity: 1;
    }

    #bottomHud {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      color: rgba(255,255,255,.9);
      font-size: 12px;
      text-shadow: 0 2px 12px rgba(0,0,0,.7);
      pointer-events: none;
    }

    #controls {
      max-width: 860px;
      line-height: 1.45;
    }

    #leaveBtn {
      pointer-events: auto;
      padding: 9px 12px;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      #menu {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .setup {
        grid-template-columns: 1fr;
      }

      .character-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <main id="menu">
      <section class="panel hero">
        <div>
          <h1 class="title">CHESS<br><span>BRAWL</span></h1>
          <p class="subtitle">
            Chess fighting game.
          </p>
        </div>

        <div class="setup">
          <label>
            <span class="badge">Name</span>
            <input id="nameInput" placeholder="Player name" maxlength="18" />
          </label>

          <label>
            <span class="badge">Board name</span>
            <input id="lobbyInput" placeholder="Lobby name" maxlength="28" />
          </label>

          <button id="createBtn">Create Board</button>
        </div>

        <div id="characterGrid" class="character-grid"></div>
      </section>

      <aside class="panel side-panel">
        <div>
          <h2 class="section-title">Open Boards</h2>
          <p class="subtitle">Join a waiting board or watch a match in progress.</p>
        </div>

        <div id="lobbies" class="lobbies"></div>

        <div>
          <h2 class="section-title">Leaderboard</h2>
          <div id="leaderboard" class="leaderboard"></div>
        </div>
      </aside>
    </main>

    <section id="gameWrap">
      <div id="gameFrame">
        <canvas id="game" width="960" height="540"></canvas>

        <div id="overlay">
          <div id="topHud">
            <div class="hudSide">
              <div class="nameLine">
                <span id="whiteName">White</span>
                <span id="whitePiece" class="badge">King</span>
              </div>
              <div class="barShell"><div id="whiteHp" class="bar whiteHp"></div></div>
              <div class="meterShell"><div id="whiteMeter" class="meter stamina"></div></div>
              <div class="meterShell"><div id="whitePromo" class="meter promo"></div></div>
              <div class="ultimateShell"><div id="whiteUlt" class="meter ultimate"></div></div>
            </div>

            <div id="centerHud">
              <div id="roundText">Round 1</div>
              <div id="timer">99</div>
            </div>

            <div class="hudSide right">
              <div class="nameLine">
                <span id="blackPiece" class="badge">King</span>
                <span id="blackName">Black</span>
              </div>
              <div class="barShell"><div id="blackHp" class="bar blackHp"></div></div>
              <div class="meterShell"><div id="blackMeter" class="meter stamina"></div></div>
              <div class="meterShell"><div id="blackPromo" class="meter promo"></div></div>
              <div class="ultimateShell"><div id="blackUlt" class="meter ultimate"></div></div>
            </div>
          </div>

          <div id="message"></div>
          <div id="debugNotice">Hitboxes ON</div>

          <div id="bottomHud">
            <div id="controls">
              <b>Move:</b> A/D · <b>Jump:</b> W/Space · <b>Crouch/Fast Fall:</b> S ·
              <b>Light:</b> J · <b>Heavy:</b> K · <b>Special:</b> L ·
              <b>Ultimate:</b> I · <b>Dash / Counter:</b> Shift · <b>Hitboxes:</b> H
            </div>
            <button id="leaveBtn" class="danger">Leave</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const socket = io();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const menu = document.getElementById("menu");
    const gameWrap = document.getElementById("gameWrap");
    const characterGrid = document.getElementById("characterGrid");
    const lobbiesEl = document.getElementById("lobbies");
    const leaderboardEl = document.getElementById("leaderboard");

    const nameInput = document.getElementById("nameInput");
    const lobbyInput = document.getElementById("lobbyInput");
    const createBtn = document.getElementById("createBtn");
    const leaveBtn = document.getElementById("leaveBtn");

    const whiteNameEl = document.getElementById("whiteName");
    const blackNameEl = document.getElementById("blackName");
    const whitePieceEl = document.getElementById("whitePiece");
    const blackPieceEl = document.getElementById("blackPiece");
    const whiteHpEl = document.getElementById("whiteHp");
    const blackHpEl = document.getElementById("blackHp");
    const whiteMeterEl = document.getElementById("whiteMeter");
    const blackMeterEl = document.getElementById("blackMeter");
    const whitePromoEl = document.getElementById("whitePromo");
    const blackPromoEl = document.getElementById("blackPromo");
    const whiteUltEl = document.getElementById("whiteUlt");
    const blackUltEl = document.getElementById("blackUlt");
    const roundTextEl = document.getElementById("roundText");
    const timerEl = document.getElementById("timer");
    const messageEl = document.getElementById("message");
    const debugNoticeEl = document.getElementById("debugNotice");

    const GLYPHS = {
      king: "♔",
      queen: "♕",
      rook: "♖",
      bishop: "♗",
      knight: "♘",
      pawn: "♙"
    };

    const state = {
      id: null,
      role: "menu",
      selected: "king",
      characters: {},
      lobbyData: { lobbies: [], leaderboard: [] },
      gameState: null,
      seenFx: new Set(),
      particles: [],
      localFx: [],
      t: 0,
      shake: 0,
      flash: 0,
      showHitboxes: false,
      input: {
        left: false,
        right: false,
        up: false,
        down: false,
        seq: {
          light: 0,
          heavy: 0,
          special: 0,
          counter: 0,
          ultimate: 0,
          jump: 0
        }
      }
    };

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function pct(v, max) {
      return max ? clamp(v / max * 100, 0, 100) : 0;
    }

    function pieceOf(f) {
      if (!f) return "king";
      if (f.characterKey === "pawn" && f.promoted) return "queen";
      return f.characterKey || "king";
    }

    function isBishopSword(f) {
      return !!(
        f &&
        f.characterKey === "bishop" &&
        f.ultimateState &&
        f.ultimateState.type === "bishopSword" &&
        f.ultimateState.phase === "active"
      );
    }

    function glyph(f) {
      return GLYPHS[pieceOf(f)] || "♙";
    }

    function mat(f) {
      if (!f || f.side === "black") {
        return {
          fill: "#080808",
          fill2: "#2a2a2a",
          outline: "rgba(255,255,255,.36)",
          glow: "rgba(50,50,50,.88)",
          weapon: "#111",
          weapon2: "#555",
          edge: "#f5ead7",
          magic: "rgba(95,95,95,.9)",
          ult: "rgba(255,214,80,.85)",
          sword: "#111111",
          sword2: "#454545",
          dust: "80,70,60"
        };
      }

      return {
        fill: "#fff4dc",
        fill2: "#e5cfa8",
        outline: "rgba(61,38,19,.75)",
        glow: "rgba(255,235,185,.9)",
        weapon: "#f2dfbd",
        weapon2: "#b38348",
        edge: "#503018",
        magic: "rgba(255,232,170,.9)",
        ult: "rgba(255,211,71,.95)",
        sword: "#1a1a1a",
        sword2: "#555555",
        dust: "210,185,145"
      };
    }

    function dir(f) {
      return f.attack ? (f.attackFacing || f.facing || 1) : (f.facing || 1);
    }

    function center(f) {
      return { x: f.x + f.w / 2, y: f.y + f.h / 2 };
    }

    function progress(f) {
      if (!f.attackDuration) return 0;
      return clamp((f.attackDuration - f.attackTimer) / f.attackDuration, 0, 1);
    }

    function elapsed(f) {
      return f.attackDuration - f.attackTimer;
    }

    function ease(x) {
      x = Number.isFinite(x) ? x : 0;
      return 1 - Math.pow(1 - clamp(x, 0, 1), 3);
    }

    function html(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[c]));
    }

    function sendInput() {
      socket.emit("input", state.input);
    }

    function pressAction(name) {
      state.input.seq[name]++;
      sendInput();
    }

    const keys = {
      KeyA: ["hold", "left"],
      ArrowLeft: ["hold", "left"],
      KeyD: ["hold", "right"],
      ArrowRight: ["hold", "right"],
      KeyW: ["jump", "up"],
      ArrowUp: ["jump", "up"],
      Space: ["jump", "up"],
      KeyS: ["hold", "down"],
      ArrowDown: ["hold", "down"],
      KeyJ: ["action", "light"],
      KeyK: ["action", "heavy"],
      KeyL: ["action", "special"],
      KeyI: ["action", "ultimate"],
      ShiftLeft: ["action", "counter"],
      ShiftRight: ["action", "counter"]
    };

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyH" && !e.repeat) {
        state.showHitboxes = !state.showHitboxes;
        debugNoticeEl.classList.toggle("show", state.showHitboxes);
        return;
      }

      const k = keys[e.code];
      if (!k) return;
      e.preventDefault();

      if (k[0] === "hold") {
        state.input[k[1]] = true;
      }

      if (k[0] === "jump") {
        if (!state.input.up) pressAction("jump");
        state.input.up = true;
      }

      if (k[0] === "action" && !e.repeat) {
        pressAction(k[1]);
      }

      sendInput();
    });

    window.addEventListener("keyup", (e) => {
      const k = keys[e.code];
      if (!k) return;
      e.preventDefault();

      if (k[0] === "hold") state.input[k[1]] = false;
      if (k[0] === "jump") state.input.up = false;

      sendInput();
    });

    setInterval(() => {
      if (state.role !== "menu") sendInput();
    }, 1000 / 20);

    createBtn.onclick = () => {
      const n = nameInput.value.trim();
      const l = lobbyInput.value.trim();

      if (n) socket.emit("setName", n);
      socket.emit("setCharacter", state.selected);
      socket.emit("createLobby", l || undefined);
    };

    leaveBtn.onclick = () => {
      socket.emit("leaveLobby");
      showMenu();
    };

    nameInput.onchange = () => socket.emit("setName", nameInput.value);

    socket.on("welcome", (data) => {
      state.id = data.id;
      state.characters = data.characters || {};
      renderCharacters();
    });

    socket.on("lobbyData", (data) => {
      state.lobbyData = data || {};
      state.characters = data.characters || state.characters;
      renderCharacters();
      renderLobbies();
      renderLeaderboard();
    });

    socket.on("enteredLobby", (data) => {
      state.role = data.role || "spectator";
      showGame();
    });

    socket.on("leftLobby", showMenu);

    socket.on("gameState", (gs) => {
      state.gameState = gs;
      consumeFx(gs);
      updateHud(gs);

      if (gs?.lobby?.status !== "waiting") showGame();
    });

    function renderCharacters() {
      characterGrid.innerHTML = "";

      for (const [key, ch] of Object.entries(state.characters)) {
        const card = document.createElement("div");
        card.className = `character-card ${state.selected === key ? "selected" : ""}`;
        card.innerHTML = `
          <div class="piece-big">${GLYPHS[key]}</div>
          <h3>${ch.name}</h3>
          <p>${ch.title}</p>
        `;
        card.onclick = () => {
          state.selected = key;
          socket.emit("setCharacter", key);
          renderCharacters();
        };
        characterGrid.appendChild(card);
      }
    }

    function renderLobbies() {
      const list = state.lobbyData.lobbies || [];
      lobbiesEl.innerHTML = "";

      if (!list.length) {
        const d = document.createElement("div");
        d.className = "lobby-card";
        d.innerHTML = `<div class="subtitle">No boards open yet.</div>`;
        lobbiesEl.appendChild(d);
        return;
      }

      for (const l of list) {
        const canJoin = l.status === "waiting" && !l.blackName;
        const d = document.createElement("div");
        d.className = "lobby-card";
        d.innerHTML = `
          <div class="lobby-top">
            <div class="lobby-name">${html(l.name || "Untitled")}</div>
            <div class="badge">${html(l.status)}</div>
          </div>
          <div class="subtitle">White: ${html(l.whiteName || "open")} · Black: ${html(l.blackName || "open")} · Watching: ${l.spectatorCount || 0}</div>
          <div class="lobby-actions">
            ${canJoin ? `<button data-join="${l.id}">Join</button>` : ""}
            <button class="secondary" data-watch="${l.id}">Watch</button>
          </div>
        `;
        lobbiesEl.appendChild(d);
      }

      lobbiesEl.querySelectorAll("[data-join]").forEach((b) => {
        b.onclick = () => socket.emit("joinLobby", b.dataset.join);
      });

      lobbiesEl.querySelectorAll("[data-watch]").forEach((b) => {
        b.onclick = () => socket.emit("watchLobby", b.dataset.watch);
      });
    }

    function renderLeaderboard() {
      leaderboardEl.innerHTML = "";
      const rows = state.lobbyData.leaderboard || [];

      if (!rows.length) {
        leaderboardEl.textContent = "No wins yet.";
        return;
      }

      rows.forEach((r, i) => {
        const d = document.createElement("div");
        d.textContent = `${i + 1}. ${r.name}: ${r.score}`;
        leaderboardEl.appendChild(d);
      });
    }

    function showGame() {
      menu.style.display = "none";
      gameWrap.style.display = "grid";
    }

    function showMenu() {
      menu.style.display = "grid";
      gameWrap.style.display = "none";
      state.role = "menu";
      state.gameState = null;
    }

    function updateHud(gs) {
      const g = gs?.game;
      const l = gs?.lobby;
      const m = gs?.match;

      if (!g?.fighters) {
        messageEl.textContent = l?.message || "Waiting...";
        messageEl.classList.add("show");
        return;
      }

      const w = g.fighters.white;
      const b = g.fighters.black;

      whiteNameEl.textContent = l?.whiteName || w.name || "White";
      blackNameEl.textContent = l?.blackName || b.name || "Black";
      whitePieceEl.textContent = w.characterName || pieceOf(w);
      blackPieceEl.textContent = b.characterName || pieceOf(b);

      whiteHpEl.style.width = `${pct(w.hp, w.maxHp)}%`;
      blackHpEl.style.width = `${pct(b.hp, b.maxHp)}%`;
      whiteMeterEl.style.width = `${pct(w.stamina, w.maxStamina)}%`;
      blackMeterEl.style.width = `${pct(b.stamina, b.maxStamina)}%`;
      whitePromoEl.style.width = `${pct(w.promotion || 0, 190)}%`;
      blackPromoEl.style.width = `${pct(b.promotion || 0, 190)}%`;
      whiteUltEl.style.width = `${pct(w.ultimate || 0, w.ultimateMax || 100)}%`;
      blackUltEl.style.width = `${pct(b.ultimate || 0, b.ultimateMax || 100)}%`;

      roundTextEl.textContent = `Round ${m?.round || 1} · ${m?.whiteRounds || 0}-${m?.blackRounds || 0}`;
      timerEl.textContent = String(Math.ceil((g.roundTime || 0) / 60)).padStart(2, "0");

      if (g.roundOver || l?.status === "finished") {
        messageEl.textContent = l.message || "";
        messageEl.classList.add("show");
      } else {
        messageEl.classList.remove("show");
      }
    }

    function consumeFx(gs) {
      const fx = gs?.game?.effects || [];

      for (const e of fx) {
        if (!e.id || state.seenFx.has(e.id)) continue;
        state.seenFx.add(e.id);

        if (state.seenFx.size > 900) {
          state.seenFx = new Set(Array.from(state.seenFx).slice(-450));
        }

        if (e.type === "hit") {
          if (e.sword) {
            metalSparks(e.x, e.y, e.dir || 1, 34);
            addFx("swordImpact", e.x, e.y, { life: 22, dir: e.dir || 1 });
            state.shake = Math.max(state.shake, 13);
            state.flash = Math.max(state.flash, .08);
          } else {
            burst(e.x, e.y, e.ultimate ? "255,211,71" : "255,235,200", e.ultimate ? 54 : 24, e.ultimate ? 13 : 8);
            addFx(e.ultimate ? "ultimateImpact" : "impact", e.x, e.y, { life: e.ultimate ? 30 : 18 });
            state.shake = Math.max(state.shake, e.ultimate ? 16 : 8);
            state.flash = Math.max(state.flash, e.ultimate ? .2 : .1);
          }
        }

        if (e.type === "grab") {
          burst(e.x, e.y, "255,255,255", 36, 10);
          addFx("grab", e.x, e.y, { life: 24, dir: e.dir });
          state.shake = Math.max(state.shake, 12);
        }

        if (e.type === "counterStart") {
          addFx("counterStart", e.x, e.y, { life: 22, piece: e.piece, dir: e.dir });
        }

        if (e.type === "counterSuccess") {
          addFx("counterSuccess", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,255,255", 48, 11);
          state.shake = Math.max(state.shake, 13);
          state.flash = Math.max(state.flash, .2);
        }

        if (e.type === "ultimateStart") {
          addFx("ultimateStart", e.x, e.y, { life: 80, piece: e.piece, dir: e.dir, ultType: e.ultType });
          burst(e.x, e.y, "255,211,71", 90, 12);
          state.shake = Math.max(state.shake, 16);
          state.flash = Math.max(state.flash, .18);
        }

        if (e.type === "bishopSwordAwaken") {
          addFx("bishopSwordAwaken", e.x, e.y, { life: 80, dir: e.dir });
          burst(e.x, e.y, "255,230,120", 80, 10);
          state.shake = Math.max(state.shake, 13);
          state.flash = Math.max(state.flash, .18);
        }

        if (e.type === "bishopSwordReady") {
          addFx("bishopSwordReady", e.x, e.y, { life: 46, dir: e.dir });
          metalSparks(e.x, e.y, e.dir || 1, 36);
        }

        if (e.type === "bishopSwordPulse") {
          addFx("bishopSwordPulse", e.x, e.y, { life: 18, dir: e.dir });
        }

        if (e.type === "bishopSwordEnd") {
          addFx("bishopSwordEnd", e.x, e.y, { life: 34, dir: e.dir });
        }

        if (e.type === "bishopSwordMove") {
          addFx("bishopSwordMove", e.x, e.y, {
            life: 16,
            attack: e.attack,
            aim: e.aim,
            dir: e.dir
          });
        }

        if (e.type === "bishopSwordParry") {
          addFx("bishopSwordParry", e.x, e.y, { life: 34, dir: e.dir });
          metalSparks(e.x, e.y, e.dir || 1, 58);
          state.shake = Math.max(state.shake, 15);
          state.flash = Math.max(state.flash, .14);
        }

        if (e.type === "ultimateLock") {
          addFx("ultimateLock", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          state.shake = Math.max(state.shake, 8);
        }

        if (e.type === "ultimateBurst") {
          addFx("ultimateBurst", e.x, e.y, { life: 34, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 56, 13);
          state.shake = Math.max(state.shake, 13);
        }

        if (e.type === "rookShell") {
          addFx("rookShell", e.x, e.y, { life: 20, piece: e.piece, dir: e.dir });
        }

        if (e.type === "bishopTrail") {
          addFx("bishopTrail", e.x, e.y, { life: 18 });
        }

        if (e.type === "bishopFinish") {
          addFx("bishopFinish", e.x, e.y, { life: 30, dir: e.dir });
        }

        if (e.type === "knightWindup") {
          addFx("knightWindup", e.x, e.y, { life: 20, piece: e.piece, dir: e.dir });
        }

        if (e.type === "knightBurst") {
          addFx("knightBurst", e.x, e.y, { life: 16, piece: e.piece, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 34, 8);
        }

        if (e.type === "knightSlam") {
          addFx("knightSlam", e.x, e.y, { life: 36, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 48, 11);
          state.shake = Math.max(state.shake, 14);
        }

        if (e.type === "pawnPromoteBurst") {
          addFx("pawnPromoteBurst", e.x, e.y, { life: 46, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 70, 10);
        }

        if (e.type === "queenFinisherStart") {
          addFx("queenFinisherStart", e.x, e.y, { life: 42, hits: e.hits || 0, dir: e.dir });
        }

        if (e.type === "queenFinisher") {
          addFx("queenFinisher", e.x, e.y, { life: 55, hits: e.hits || 0, dir: e.dir });
          burst(e.x, e.y, "255,211,71", 110, 15);
          state.shake = Math.max(state.shake, 18);
          state.flash = Math.max(state.flash, .25);
        }

        if (e.type === "dash") addFx("dash", e.x, e.y, { life: 16, dir: e.dir });

        if (e.type === "wallBounce") {
          burst(e.x, e.y, "255,255,255", 18, 5);
          state.shake = Math.max(state.shake, 9);
        }

        if (e.type === "queenEnd") addFx("queenEnd", e.x, e.y, { life: 34 });
        if (e.type === "roundWin") addFx("roundWin", e.x, e.y, { life: 64 });
      }
    }

    function addParticle(x, y, o = {}) {
      if (!Number.isFinite(x)) x = 480;
      if (!Number.isFinite(y)) y = 270;

      state.particles.push({
        x,
        y,
        vx: o.vx ?? (Math.random() - .5) * 5,
        vy: o.vy ?? (Math.random() - .5) * 5,
        r: o.r ?? 2 + Math.random() * 5,
        life: o.life ?? 20,
        max: o.life ?? 20,
        color: o.color ?? "255,255,255",
        g: o.g ?? .08
      });

      if (state.particles.length > 900) {
        state.particles.splice(0, state.particles.length - 900);
      }
    }

    function burst(x, y, color, count, power) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * power;
        addParticle(x, y, {
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - Math.random() * 1.8,
          color,
          life: 14 + Math.random() * 22,
          r: 2 + Math.random() * 6
        });
      }
    }

    function metalSparks(x, y, dir = 1, count = 18) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) return;

      for (let i = 0; i < count; i++) {
        const a = Math.PI + (Math.random() - .5) * 1.4;
        const s = 2 + Math.random() * 8;

        addParticle(x, y, {
          vx: Math.cos(a) * s * dir,
          vy: Math.sin(a) * s - Math.random() * 3,
          color: Math.random() > .35 ? "255,220,120" : "255,255,235",
          life: 10 + Math.random() * 14,
          r: 1.2 + Math.random() * 2.2,
          g: .18
        });
      }
    }

    function addFx(type, x, y, data = {}) {
      if (!Number.isFinite(x)) x = 480;
      if (!Number.isFinite(y)) y = 270;

      state.localFx.push({
        type,
        x,
        y,
        life: data.life || 24,
        max: data.life || 24,
        ...data
      });

      if (state.localFx.length > 280) {
        state.localFx.splice(0, state.localFx.length - 280);
      }
    }

    function rr(x, y, w, h, r) {
      if (![x, y, w, h, r].every(Number.isFinite)) return;
      if (w <= 0 || h <= 0) return;

      r = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function checker(x, y, w, h, tile, a, b, alpha = 1, ox = 0, oy = 0) {
      if (![x, y, w, h, tile].every(Number.isFinite)) return;
      if (tile <= 0 || w <= 0 || h <= 0) return;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();

      for (let yy = y - tile; yy < y + h + tile; yy += tile) {
        for (let xx = x - tile; xx < x + w + tile; xx += tile) {
          const ix = Math.floor((xx - x + ox) / tile);
          const iy = Math.floor((yy - y + oy) / tile);
          ctx.fillStyle = (ix + iy) % 2 ? b : a;
          ctx.fillRect(xx, yy, tile, tile);
        }
      }

      ctx.restore();
    }

    function drawBackground(game) {
      const floor = game?.floorY || 430;

      const bg = ctx.createLinearGradient(0, 0, 0, 540);
      bg.addColorStop(0, "#ead8bb");
      bg.addColorStop(.45, "#c8a073");
      bg.addColorStop(1, "#71441f");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 960, 540);

      checker(42, 38, 876, 245, 64, "#f1ddbd", "#a16b3c", .72, state.t * .035, state.t * .035);

      ctx.strokeStyle = "rgba(80,45,18,.68)";
      ctx.lineWidth = 10;
      ctx.strokeRect(42, 38, 876, 245);

      ctx.save();
      ctx.globalAlpha = .15;
      ctx.font = "900 46px Georgia";
      ctx.textAlign = "center";
      ctx.fillStyle = "#5b3218";
      for (let i = 0; i < 12; i++) {
        const g = ["♔", "♕", "♖", "♗", "♘", "♙"][i % 6];
        ctx.fillText(g, 58 + i * 82, 174 + Math.sin(state.t * .025 + i) * 9);
      }
      ctx.restore();

      checker(0, floor - 4, 960, 540 - floor + 4, 60, "#f7e5c9", "#9f6b3a");

      const shine = ctx.createLinearGradient(0, floor - 4, 0, 540);
      shine.addColorStop(0, "rgba(255,255,255,.16)");
      shine.addColorStop(1, "rgba(0,0,0,.20)");
      ctx.fillStyle = shine;
      ctx.fillRect(0, floor - 4, 960, 540 - floor + 4);

      ctx.strokeStyle = "rgba(75,45,20,.85)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, floor - 3);
      ctx.lineTo(960, floor - 3);
      ctx.stroke();

      const vignette = ctx.createRadialGradient(480, 260, 160, 480, 260, 620);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,.38)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, 960, 540);
    }

    function drawPiece(f, x, y, scale = 1, alpha = 1) {
      if (!f || !Number.isFinite(x) || !Number.isFinite(y)) return;

      const m = mat(f);
      const size = Math.round(f.h * 1.18 * scale);

      if (!Number.isFinite(size) || size <= 0) return;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${size}px Georgia, "Times New Roman", serif`;
      ctx.shadowColor = "rgba(0,0,0,.55)";
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 5;

      ctx.lineWidth = f.side === "white" ? 4.2 : 4.6;
      ctx.strokeStyle = m.outline;
      ctx.strokeText(glyph(f), x, y);

      const grad = ctx.createLinearGradient(x, y - size * .5, x, y + size * .45);
      if (f.side === "white") {
        grad.addColorStop(0, "#fff");
        grad.addColorStop(.5, "#fff3db");
        grad.addColorStop(1, "#dfc18f");
      } else {
        grad.addColorStop(0, "#5a5a5a");
        grad.addColorStop(.35, "#111");
        grad.addColorStop(1, "#000");
      }

      ctx.fillStyle = grad;
      ctx.fillText(glyph(f), x, y);

      if (f.promoted || isBishopSword(f)) {
        ctx.globalAlpha = alpha * .28;
        ctx.lineWidth = 2.4;
        ctx.strokeStyle = "rgba(255,220,115,.95)";
        ctx.strokeText(glyph(f), x, y);
      }

      ctx.restore();
    }

    function shadow(f) {
      if (!f) return;

      const c = center(f);
      const floor = state.gameState?.game?.floorY || 430;
      const air = clamp((floor - (f.y + f.h)) / 150, 0, 1);

      ctx.save();
      ctx.globalAlpha = .32 * (1 - air * .65);
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(c.x, floor + 8, f.w * (.92 - air * .28), 16 * (1 - air * .25), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function line(points, m, w = 8, alpha = 1) {
      if (!points || points.length < 2) return;

      points = points.filter(p =>
        p &&
        Number.isFinite(p.x) &&
        Number.isFinite(p.y)
      );

      if (points.length < 2) return;

      w = Number.isFinite(w) ? Math.max(1, w) : 8;
      alpha = Number.isFinite(alpha) ? clamp(alpha, 0, 1) : 1;
      m = m || {};

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.strokeStyle = "rgba(0,0,0,.35)";
      ctx.lineWidth = w + 6;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();

      ctx.strokeStyle = m.weapon || "#eee";
      ctx.lineWidth = w;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();

      ctx.strokeStyle = m.edge || "#000";
      ctx.lineWidth = Math.max(2, w * .25);
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.stroke();

      ctx.restore();
    }

    function blade(x, y, angle, len, m, p, width = 10) {
      if (![x, y, angle, len, p, width].every(Number.isFinite)) return;
      if (len <= 0) return;

      m = m || {};
      const q = ease(p);
      const tip = {
        x: x + Math.cos(angle) * len * q,
        y: y + Math.sin(angle) * len * q
      };

      line([
        { x, y },
        {
          x: x + Math.cos(angle) * len * q * .56,
          y: y + Math.sin(angle) * len * q * .56
        },
        tip
      ], m, width, clamp(.15 + q, 0, 1));

      if (!Number.isFinite(tip.x) || !Number.isFinite(tip.y)) return;

      ctx.save();
      ctx.translate(tip.x, tip.y);
      ctx.rotate(angle);
      ctx.globalAlpha = clamp(q, 0, 1);
      ctx.fillStyle = m.weapon2 || "#ccc";
      ctx.strokeStyle = m.edge || "#000";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(20, 0);
      ctx.lineTo(-8, -8);
      ctx.lineTo(-3, 0);
      ctx.lineTo(-8, 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function arc(cx, cy, r, a1, a2, m, width, alpha = 1) {
      if (![cx, cy, r, a1, a2, width, alpha].every(Number.isFinite)) return;
      if (r <= 0) return;

      m = m || {};

      ctx.save();
      ctx.globalAlpha = clamp(alpha, 0, 1);
      ctx.lineCap = "round";

      ctx.strokeStyle = "rgba(0,0,0,.3)";
      ctx.lineWidth = width + 6;
      ctx.beginPath();
      ctx.arc(cx, cy, r, a1, a2);
      ctx.stroke();

      ctx.strokeStyle = m.weapon || "#eee";
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.arc(cx, cy, r, a1, a2);
      ctx.stroke();

      ctx.strokeStyle = m.edge || "#000";
      ctx.lineWidth = Math.max(2, width * .25);
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(1, r - 2), a1, a2);
      ctx.stroke();

      ctx.restore();
    }

    function spark(x, y, m, len = 20, rays = 7) {
      if (![x, y, len, rays].every(Number.isFinite)) return;
      m = m || {};

      ctx.save();
      ctx.strokeStyle = m.magic || "rgba(255,255,255,.8)";
      ctx.lineWidth = 2.2;
      ctx.lineCap = "round";
      for (let i = 0; i < rays; i++) {
        const a = i * Math.PI * 2 / rays + state.t * .02;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
        ctx.stroke();
      }
      ctx.restore();
    }

    function dust(x, y, d, m, count = 5) {
      if (![x, y, d, count].every(Number.isFinite)) return;
      m = m || {};

      ctx.save();
      ctx.fillStyle = `rgba(${m.dust || "200,180,150"},.65)`;
      for (let i = 0; i < count; i++) {
        ctx.beginPath();
        ctx.ellipse(x - d * (i * 16 + 8), y + Math.sin(i) * 3, 14 + i * 2, 6 + i, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

        function after(f, x, y, s = 1, a = .16) {
      drawPiece(f, x, y, s, a);
    }

    function hammer(c, d, m, p) {
      if (!c || !Number.isFinite(c.x) || !Number.isFinite(c.y)) return;
      const q = ease(p);
      const x = c.x + d * (20 + 70 * q);
      const y = c.y - 28 + 40 * q;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(d * (-.8 + 1.4 * q));
      ctx.fillStyle = m.weapon;
      ctx.strokeStyle = m.edge;
      ctx.lineWidth = 3;

      rr(-12, -48, 24, 76, 6);
      ctx.fill();
      ctx.stroke();

      rr(-36, -62, 72, 30, 7);
      ctx.fill();

          if (f.attackAim === "up") blade(c.x, c.y + 38, -Math.PI / 2, 300, m, s, 18);

    function drawCounter(f, m) {
      const c = center(f);
      const d = dir(f);
      const e = elapsed(f);
      const p = pieceOf(f);
      const sword = isBishopSword(f);

      if (e < 14) {
        ctx.save();
        ctx.globalAlpha = .55 + Math.sin(state.t * .6) * .12;
        ctx.strokeStyle = sword ? "rgba(255,245,190,.95)" : m.magic;
        ctx.lineWidth = sword ? 6 : 4;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 40 + e * 2, 0, Math.PI * 2);

        if (sword) greatSword(c, d, m, .55, -1.1, 190, 15);

        ctx.font = "900 36px Georgia";
        ctx.textAlign = "center";
        ctx.fillStyle = sword ? "rgba(255,245,190,.95)" : m.magic;
        ctx.fillText(GLYPHS[p], c.x, c.y - 62);
        ctx.restore();
        return;
      }

      const s = clamp((e - 14) / 14, 0, 1);

      if (p === "king") {
        hammer(c, d, m, s);
        blade(c.x - d * 8, c.y + 30, d === 1 ? -.2 : Math.PI + .2, 130, m, s, 18);

        cannon(c, d, m, s);

        if (sword) {
          greatSword(c, d, m, s, -0.4, 270, 23);
          arc(c.x + d * 16, c.y, 120 * s, d === 1 ? -1.2 : Math.PI + .1, d === 1 ? .9 : Math.PI - .9, { ...m, weapon: "rgba(255,245,190,.8)" }, 18, s);

          staff(c, d, m, s, -.88, 166, 15);
          staff(c, d, m, Math.max(0, s - .18), .65, 120, 10);
        }
      } else if (p === "knight") {
        line([{ x: c.x - d * 46, y: c.y + 34 }, { x: c.x + d * 42 * s, y: c.y + 34 }, { x: c.x + d * 42 * s, y: c.y - 60 * s }], m, 16, s);
        lance(c, d, m, s, -.2);
      } else if (p === "pawn") {
        spear(c, d, m, s, 126, 11, 0);

    function drawHitboxes(f) {
      if (!state.showHitboxes || !f) return;

      ctx.save();
      ctx.globalAlpha = .24;
      ctx.fillStyle = f.side === "white" ? "rgba(255,255,255,.55)" : "rgba(0,0,0,.55)";
      ctx.fillRect(f.x, f.y, f.w, f.h);

      ctx.globalAlpha = .95;
      ctx.strokeStyle = f.side === "white" ? "#fff" : "#111";
      ctx.lineWidth = 2;
      ctx.strokeRect(f.x, f.y, f.w, f.h);

      ctx.restore();
    }

    function drawFighter(f) {
      if (!f || !Number.isFinite(f.x) || !Number.isFinite(f.y)) return;

      const c = center(f);
      const m = mat(f);
      const bob = Math.sin(state.t * .08 + (f.side === "white" ? 0 : 2)) * (f.grounded ? 1 : .4);

      shadow(f);

      ctx.save();
      ctx.globalAlpha = f.side === "white" ? .1 : .18;
      ctx.fillStyle = f.side === "white" ? "rgba(255,255,255,.22)" : "rgba(0,0,0,.26)";
      ctx.beginPath();
      ctx.ellipse(c.x, f.y + f.h + 9, f.w * .85, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawUltimateVisual(f);
      if (isBishopSword(f) && !f.attack) drawBishopIdleSword(f);
      drawWeapon(f);

      ctx.save();
      if (f.hurt > 0) ctx.translate((Math.random() - .5) * 2.2, 0);
      drawPiece(f, c.x, c.y + bob, 1 + (f.attack || f.ultimateState ? .018 : 0), 1);

      if (f.armor > 0) {
        ctx.globalAlpha = .34;
        ctx.strokeStyle = m.magic;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, f.w * .74, f.h * .58, 0, 0, Math.PI * 2);
        ctx.stroke();

      if (isBishopSword(f)) {
        ctx.globalAlpha = .34 + Math.sin(state.t * .18) * .08;
        ctx.strokeStyle = "rgba(255,230,150,.85)";
        ctx.lineWidth = 2.5;
        ctx.shadowColor = "rgba(255,215,70,.35)";
        ctx.shadowBlur = 10;

        ctx.ellipse(c.x, c.y, f.w * 1.05, f.h * .78, 0, 0, Math.PI * 2);

        ctx.beginPath();
        ctx.ellipse(c.x, c.y, f.w * .94, f.h * .72, 0, 0, Math.PI * 2);

      ctx.restore();

      ctx.save();

    function drawCooldownDots(f) {
      const c = center(f);
      const y = f.y + f.h + 18;
      const vals = [f.lightCd || 0, f.heavyCd || 0, f.specialCd || 0, f.counterCd || 0, f.ultimateCd || 0];
      const max = [20, 60, 250, 150, 360];

      ctx.save();
      for (let i = 0; i < 5; i++) {
        const x = c.x - 36 + i * 18;
        const ready = vals[i] <= 0;

        ctx.globalAlpha = ready ? .85 : .35;
        ctx.fillStyle =
          i === 4 && ready ? "#ffd84e" :
          i === 3 && ready ? "#ffe6a0" :
          ready ? "#fff" :
          "rgba(255,255,255,.3)";
        ctx.beginPath();
        ctx.arc(x, y, i === 4 ? 5.4 : 4.5, 0, Math.PI * 2);
        ctx.fill();

        if (!ready) {
          ctx.strokeStyle = "rgba(0,0,0,.55)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(x, y, 6.2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(vals[i] / max[i], 0, 1));
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      for (const p of state.particles) {
        const a = clamp(p.life / p.max, 0, 1);
        ctx.globalAlpha = a;
        ctx.fillStyle = `rgba(${p.color},${a})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.g;
        p.vx *= .985;
        p.life--;
      }
      ctx.restore();

      state.particles = state.particles.filter((p) => p.life > 0);
    }

        if (fx.type === "roundWin") {
          ctx.globalAlpha = a;
          ctx.fillStyle = `rgba(255,240,200,${.28 * a})`;
          ctx.beginPath();
          ctx.arc(fx.x, fx.y, 56 + p * 170, 0, Math.PI * 2);
          ctx.fill();

          ctx.font = "900 74px Georgia";
          ctx.textAlign = "center";
          ctx.fillStyle = `rgba(255,255,255,${a})`;
          ctx.fillText("♕", fx.x, fx.y + 22);
        }

        fx.life--;
      }

      ctx.restore();
      state.localFx = state.localFx.filter((fx) => fx.life > 0);
    }

    function drawWaiting() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,.18)";
      ctx.fillRect(0, 0, 960, 540);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "1000 54px system-ui";
      ctx.fillStyle = "rgba(70,40,20,.95)";
      ctx.shadowColor = "rgba(255,255,255,.5)";
      ctx.shadowBlur = 12;
      ctx.fillText("WAITING FOR BOARD", 480, 238);

      ctx.font = "500 18px system-ui";
      ctx.fillStyle = "rgba(70,40,20,.78)";
      ctx.fillText("Click "Leave" to return to the main menu", 480, 286);
      ctx.restore();
    }

    function drawRoundOverlay(game) {
      if (!game.roundWinner) return;

      ctx.save();
      ctx.fillStyle = "rgba(90,60,34,.22)";
      ctx.fillRect(0, 0, 960, 540);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "1000 66px system-ui";
      ctx.fillStyle = game.roundWinner === "white" ? "#fff7ec" : "#2b1a10";
      ctx.shadowColor = "rgba(0,0,0,.35)";
      ctx.shadowBlur = 20;
      ctx.fillText(`${game.roundWinner.toUpperCase()} TAKES THE ROUND`, 480, 270);
      ctx.restore();
    }

    function loop() {
      state.t++;

      const gs = state.gameState;
      const game = gs?.game;

      if (state.shake > 0) state.shake *= .82;
      if (state.flash > 0) state.flash *= .86;

      ctx.save();

      const shake = Math.max(state.shake, game?.shake || 0);
      ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake * .7);

      drawBackground(game);

      if (!game?.fighters) {
        drawWaiting();
        ctx.restore();
        requestAnimationFrame(loop);
        return;
      }

      const w = game.fighters.white;
      const b = game.fighters.black;

      if (w.x < b.x) {
        drawFighter(w);
        drawFighter(b);
      } else {
        drawFighter(b);
        drawFighter(w);
      }

      drawParticles();
      drawLocalFx();

      ctx.restore();

      if (state.flash > 0) {
        ctx.save();
        ctx.globalAlpha = state.flash;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, 960, 540);
        ctx.restore();
      }

      if (game.roundOver) drawRoundOverlay(game);

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
