<!DOCTYPE html>
<html>
<head>
  <title>Link Fighter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #252538, #07070b);
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      background: #eeeeee;
      color: #111;
    }

    button:hover {
      filter: brightness(1.1);
    }

    input {
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
    }

    .screen {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .active {
      display: block;
    }

    .panel {
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 0 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      font-size: 46px;
      margin-bottom: 5px;
      letter-spacing: 3px;
    }

    .subtitle {
      text-align: center;
      color: #bbb;
      margin-top: 0;
      margin-bottom: 25px;
    }

    #menuGrid {
      display: grid;
      grid-template-columns: 1fr 1.5fr 1fr;
      gap: 18px;
    }

    .characterGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .characterCard {
      padding: 12px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.28);
      border: 2px solid transparent;
      cursor: pointer;
    }

    .characterCard.selected {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.16);
    }

    .characterName {
      font-size: 20px;
      font-weight: bold;
    }

    .stats {
      color: #bbb;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.35;
    }

    .lobbyItem {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .lobbyTitle {
      font-size: 18px;
      font-weight: bold;
    }

    .lobbyMeta {
      color: #bbb;
      font-size: 13px;
      margin-top: 4px;
    }

    .waiting {
      color: #88ffaa;
    }

    .playing {
      color: #ffdf70;
    }

    .finished {
      color: #aaa;
    }

    .leaderboardRow {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      margin-bottom: 7px;
    }

    #createArea {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    #lobbyName {
      flex: 1;
    }

    #gameTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 12px;
    }

    #gameInfo {
      flex: 1;
      text-align: center;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 960px;
      height: auto;
      margin: 0 auto;
      background: linear-gradient(#20243d, #11111a 60%, #2a231d 60%, #17120f);
      border: 3px solid rgba(255, 255, 255, 0.45);
      border-radius: 14px;
    }

    #controls {
      max-width: 960px;
      margin: 12px auto 0;
      color: #ccc;
      font-size: 14px;
      line-height: 1.5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #gameLeaderboard {
      max-width: 960px;
      margin: 15px auto 0;
    }

    @media (max-width: 900px) {
      #menuGrid {
        grid-template-columns: 1fr;
      }

      .lobbyItem {
        grid-template-columns: 1fr;
      }

      #controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="menuScreen" class="screen active">
    <h1>LINK FIGHTER</h1>
    <p class="subtitle">Create a lobby, join a fight, or watch someone get folded.</p>

    <div id="menuGrid">
      <div class="panel">
        <h2>Your Fighter</h2>

        <div style="display:flex; gap:8px; margin-bottom:15px;">
          <input id="nameInput" placeholder="Your name" maxlength="18" style="flex:1;">
          <button id="saveNameBtn">Save</button>
        </div>

        <div id="characterGrid" class="characterGrid"></div>
      </div>

      <div class="panel">
        <h2>Lobbies</h2>

        <div id="createArea">
          <input id="lobbyName" placeholder="Lobby name">
          <button id="createLobbyBtn">Create Lobby</button>
        </div>

        <div id="lobbyList"></div>
      </div>

      <div class="panel">
        <h2>Leaderboard</h2>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>

  <div id="gameScreen" class="screen">
    <div id="gameTop">
      <button id="leaveBtn">Leave</button>
      <div id="gameInfo">
        <h2 id="gameTitle" style="margin:0;">Fight</h2>
        <div id="gameMessage" style="color:#bbb; margin-top:4px;"></div>
      </div>
      <button id="backToLobbyBtn">Lobby</button>
    </div>

    <canvas id="canvas" width="960" height="540"></canvas>

    <div id="controls">
      <div class="panel">
        <strong>Controls</strong><br>
        A/D = move, W = jump, S = block<br>
        J = light, K = heavy, L = special
      </div>

      <div class="panel">
        <strong>Notes</strong><br>
        Blocking reduces damage if you face the attack. Winner gains one leaderboard point.
      </div>
    </div>

    <div id="gameLeaderboard" class="panel">
      <h2>Leaderboard</h2>
      <div id="leaderboardInGame"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");

    const nameInput = document.getElementById("nameInput");
    const saveNameBtn = document.getElementById("saveNameBtn");
    const characterGrid = document.getElementById("characterGrid");

    const lobbyName = document.getElementById("lobbyName");
    const createLobbyBtn = document.getElementById("createLobbyBtn");
    const lobbyList = document.getElementById("lobbyList");

    const leaderboardDiv = document.getElementById("leaderboard");
    const leaderboardInGame = document.getElementById("leaderboardInGame");

    const leaveBtn = document.getElementById("leaveBtn");
    const backToLobbyBtn = document.getElementById("backToLobbyBtn");
    const gameTitle = document.getElementById("gameTitle");
    const gameMessage = document.getElementById("gameMessage");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let characters = {};
    let selectedCharacter = "striker";
    let currentGameState = null;
    let myRole = "menu";
    let keys = {
      left: false,
      right: false,
      jump: false,
      block: false,
      light: false,
      heavy: false,
      special: false
    };

    socket.on("welcome", (data) => {
      characters = data.characters;
      renderCharacters();
    });

    socket.on("lobbyData", (data) => {
      characters = data.characters || characters;
      renderCharacters();
      renderLobbies(data.lobbies || []);
      renderLeaderboard(data.leaderboard || [], leaderboardDiv);
    });

    socket.on("enteredLobby", (data) => {
      myRole = data.role;
      showGame();
    });

    socket.on("leftLobby", () => {
      myRole = "menu";
      currentGameState = null;
      showMenu();
    });

    socket.on("gameState", (state) => {
      currentGameState = state;
      renderGameText();
      renderLeaderboard(state.leaderboard || [], leaderboardInGame);
      drawGame();
    });

    saveNameBtn.addEventListener("click", () => {
      socket.emit("setName", nameInput.value);
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        socket.emit("setName", nameInput.value);
      }
    });

    createLobbyBtn.addEventListener("click", () => {
      socket.emit("setName", nameInput.value);
      socket.emit("setCharacter", selectedCharacter);
      socket.emit("createLobby", lobbyName.value);
    });

    leaveBtn.addEventListener("click", () => {
      socket.emit("leaveLobby");
    });

    backToLobbyBtn.addEventListener("click", () => {
      socket.emit("leaveLobby");
    });

    function showMenu() {
      menuScreen.classList.add("active");
      gameScreen.classList.remove("active");
    }

    function showGame() {
      menuScreen.classList.remove("active");
      gameScreen.classList.add("active");
    }

    function renderCharacters() {
      characterGrid.innerHTML = "";

      for (const key in characters) {
        const ch = characters[key];

        const div = document.createElement("div");
        div.className = "characterCard";
        if (key === selectedCharacter) div.classList.add("selected");

        div.innerHTML = `
          <div class="characterName">${escapeHtml(ch.name)}</div>
          <div class="stats">
            HP ${ch.maxHp} · Speed ${ch.speed} · Jump ${ch.jump}<br>
            Light ${ch.lightDamage} · Heavy ${ch.heavyDamage} · Special ${ch.specialDamage}
          </div>
        `;

        div.addEventListener("click", () => {
          selectedCharacter = key;
          socket.emit("setCharacter", selectedCharacter);
          renderCharacters();
        });

        characterGrid.appendChild(div);
      }
    }

    function renderLobbies(lobbies) {
      lobbyList.innerHTML = "";

      if (lobbies.length === 0) {
        lobbyList.innerHTML = `<p style="color:#aaa;">No lobbies yet. Create one.</p>`;
        return;
      }

      for (const lobby of lobbies) {
        const div = document.createElement("div");
        div.className = "lobbyItem";

        const statusClass = lobby.status;

        div.innerHTML = `
          <div>
            <div class="lobbyTitle">${escapeHtml(lobby.name)}</div>
            <div class="lobbyMeta">
              Host: ${escapeHtml(lobby.hostName)}
              <br>
              Red: ${escapeHtml(lobby.p1Name || "waiting")}
              · Blue: ${escapeHtml(lobby.p2Name || "waiting")}
              · Watching: ${lobby.spectatorCount}
              <br>
              Status: <span class="${statusClass}">${escapeHtml(lobby.status)}</span>
            </div>
          </div>
        `;

        if (lobby.status === "waiting") {
          const join = document.createElement("button");
          join.textContent = "Join";
          join.addEventListener("click", () => {
            socket.emit("setName", nameInput.value);
            socket.emit("setCharacter", selectedCharacter);
            socket.emit("joinLobby", lobby.id);
          });
          div.appendChild(join);
        } else {
          const spacer = document.createElement("div");
          div.appendChild(spacer);
        }

        const watch = document.createElement("button");
        watch.textContent = "Watch";
        watch.addEventListener("click", () => {
          socket.emit("setName", nameInput.value);
          socket.emit("watchLobby", lobby.id);
        });
        div.appendChild(watch);

        lobbyList.appendChild(div);
      }
    }

    function renderLeaderboard(rows, target) {
      target.innerHTML = "";

      if (!rows.length) {
        target.innerHTML = `<p style="color:#aaa;">No wins yet.</p>`;
        return;
      }

      rows.forEach((row, i) => {
        const div = document.createElement("div");
        div.className = "leaderboardRow";
        div.innerHTML = `
          <span>${i + 1}. ${escapeHtml(row.name)}</span>
          <strong>${row.score}</strong>
        `;
        target.appendChild(div);
      });
    }

    function renderGameText() {
      if (!currentGameState) return;

      const lobby = currentGameState.lobby;

      gameTitle.textContent = `${lobby.name || "Fight"} — ${myRole.toUpperCase()}`;
      gameMessage.textContent = lobby.message || "";
    }

    document.addEventListener("keydown", (e) => {
      if (e.repeat) return;

      if (e.key === "a" || e.key === "A") keys.left = true;
      if (e.key === "d" || e.key === "D") keys.right = true;
      if (e.key === "w" || e.key === "W") keys.jump = true;
      if (e.key === "s" || e.key === "S") keys.block = true;
      if (e.key === "j" || e.key === "J") keys.light = true;
      if (e.key === "k" || e.key === "K") keys.heavy = true;
      if (e.key === "l" || e.key === "L") keys.special = true;

      sendInput();
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "a" || e.key === "A") keys.left = false;
      if (e.key === "d" || e.key === "D") keys.right = false;
      if (e.key === "w" || e.key === "W") keys.jump = false;
      if (e.key === "s" || e.key === "S") keys.block = false;
      if (e.key === "j" || e.key === "J") keys.light = false;
      if (e.key === "k" || e.key === "K") keys.heavy = false;
      if (e.key === "l" || e.key === "L") keys.special = false;

      sendInput();
    });

    function sendInput() {
      if (myRole === "p1" || myRole === "p2") {
        socket.emit("input", keys);
      }
    }

    setInterval(sendInput, 1000 / 30);

    function drawGame() {
      if (!currentGameState || !currentGameState.game) {
        drawWaitingScreen();
        return;
      }

      const game = currentGameState.game;
      const red = game.fighters.red;
      const blue = game.fighters.blue;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBackground(game);
      drawHealthBars(red, blue);
      drawFighter(red);
      drawFighter(blue);

      if (red.attack) drawAttackBox(red);
      if (blue.attack) drawAttackBox(blue);

      if (game.roundOver) {
        drawCenterText(currentGameState.lobby.message || "Round over");
      }
    }

    function drawWaitingScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground({ floorY: 430 });
      drawCenterText(currentGameState?.lobby?.message || "Waiting...");
    }

    function drawBackground(game) {
      ctx.fillStyle = "#1a1b2f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#25294a";
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(i * 140 - 20, 120 + (i % 2) * 30, 80, 280);
      }

      ctx.fillStyle = "#292018";
      ctx.fillRect(0, game.floorY, canvas.width, canvas.height - game.floorY);

      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, game.floorY);
      ctx.lineTo(canvas.width, game.floorY);
      ctx.stroke();
    }

    function drawHealthBars(red, blue) {
      drawOneHealthBar(30, 28, 360, red, "RED");
      drawOneHealthBar(570, 28, 360, blue, "BLUE");
    }

    function drawOneHealthBar(x, y, w, f, label) {
      const pct = Math.max(0, f.hp / f.maxHp);

      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(x, y, w, 26);

      ctx.fillStyle = f.side === "red" ? "#ff3e3e" : "#3e89ff";
      ctx.fillRect(x, y, w * pct, 26);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, 26);

      ctx.fillStyle = "white";
      ctx.font = "16px Arial";
      ctx.fillText(`${label}: ${f.name} / ${f.characterName}`, x, y - 7);
    }

    function drawFighter(f) {
      ctx.save();

      const blink = f.hurtTimer > 0 && Math.floor(f.hurtTimer / 3) % 2 === 0;

      ctx.fillStyle = blink ? "#ffffff" : f.color;
      ctx.fillRect(f.x, f.y, f.width, f.height);

      ctx.fillStyle = "#111";
      const eyeX = f.facing === 1 ? f.x + f.width - 14 : f.x + 8;
      ctx.fillRect(eyeX, f.y + 22, 7, 7);

      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.fillRect(f.x + 8, f.y + 8, f.width - 16, 14);

      if (f.blocking) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 5;
        const shieldX = f.facing === 1 ? f.x + f.width + 8 : f.x - 18;
        ctx.beginPath();
        ctx.arc(shieldX, f.y + f.height / 2, 24, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (f.attack) {
        ctx.fillStyle = "#fff";
        ctx.font = "14px Arial";
        ctx.fillText(f.attack.toUpperCase(), f.x - 5, f.y - 10);
      }

      ctx.restore();
    }

    function drawAttackBox(f) {
      const box = getAttackBox(f);

      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = f.attack === "special" ? "#ffff66" : "#ffffff";
      ctx.fillRect(box.x, box.y, box.width, box.height);
      ctx.restore();
    }

    function getAttackBox(f) {
      const range = f.attack === "heavy" ? f.reach + 22 : f.reach;
      const height = f.attack === "special" ? f.height * 0.75 : f.height * 0.55;

      if (f.facing === 1) {
        return {
          x: f.x + f.width,
          y: f.y + 18,
          width: range,
          height
        };
      }

      return {
        x: f.x - range,
        y: f.y + 18,
        width: range,
        height
      };
    }

    function drawCenterText(text) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(210, 210, 540, 90);

      ctx.fillStyle = "white";
      ctx.font = "34px Arial";
      ctx.textAlign = "center";
      ctx.fillText(text, canvas.width / 2, 265);
      ctx.textAlign = "left";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function animationLoop() {
      drawGame();
      requestAnimationFrame(animationLoop);
    }

    animationLoop();
  </script>
</body>
</html>
